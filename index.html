<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Train"/>
<meta name="theme-color" content="#f5f4f1"/>
<title>Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bg:#f5f4f1;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e6df;
  --text:#1a1917;--text2:#6b6760;--text3:#a09c96;
  --green:#1D9E75;--green2:#0F6E56;--green-bg:#EAF3DE;--green-text:#27500A;
  --purple:#534AB7;--purple2:#3C3489;--purple-bg:#EEEDFE;
  --blue:#185FA5;--blue2:#0C447C;--blue-bg:#E6F1FB;
  --red:#A32D2D;--red2:#E24B4A;--red-bg:#FCEBEB;
  --amber:#854F0B;--amber2:#633806;--amber-bg:#FAEEDA;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --radius:12px;--radius-sm:8px;--radius-lg:18px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
input,button,textarea{font-family:var(--font);font-size:15px}
button{cursor:pointer;border:none;background:none;color:inherit}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
.screen::-webkit-scrollbar{display:none}
.screen{-ms-overflow-style:none;scrollbar-width:none}
#nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;font-size:10px;color:var(--text3);transition:color 0.15s;border:none;background:none}
.nav-item i{font-size:22px}
.nav-item.active{color:var(--green)}
.nav-item.nav-photos.active{color:var(--purple)}
.nav-item.nav-progress.active{color:var(--amber)}
.page-header{padding:52px 16px 14px}
.page-title{font-size:26px;font-weight:600;letter-spacing:-0.5px}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px}
.slbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:0 16px;margin:12px 0 7px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:0 16px 10px}
.streak-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:10px}
.streak-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.streak-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.streak-val{font-size:32px;font-weight:600;color:var(--green);line-height:1;font-family:var(--mono)}
.streak-sub{font-size:11px;color:var(--text3);margin-top:3px}
.shields{display:flex;gap:3px;margin-top:6px}
.shield{font-size:13px;opacity:0.2}
.shield.on{opacity:1}
.week-dots{display:flex;gap:5px;padding:0 16px;margin-bottom:12px;justify-content:space-between}
.dw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:0.5px solid var(--border2);color:var(--text3);background:var(--bg2);transition:all 0.2s}
.dot.done{background:var(--green2);border-color:var(--green2);color:#fff}
.dot.today{border:2px solid var(--blue);color:var(--blue)}
.dot.today.done{background:var(--green2);border:2px solid var(--green);color:#fff}
.dot.act{background:var(--blue);border-color:var(--blue);color:#fff}
.dot.both{background:var(--green2);border:2px solid var(--blue);color:#fff}
.dot.rest-d{background:var(--bg3)}
.dl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.02em}
.b-lift{background:var(--blue-bg);color:var(--blue2)}
.b-leo{background:var(--purple-bg);color:var(--purple2)}
.b-combo{background:var(--amber-bg);color:var(--amber2)}
.b-surf{background:#E1F5EE;color:#085041}
.b-rest{background:var(--bg3);color:var(--text3)}
.b-adapted{background:var(--green-bg);color:var(--green-text)}
.day-switch{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:0 16px;margin-bottom:8px}
.ds-btn{padding:10px 6px;font-size:11px;font-weight:500;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s}
.ds-btn i{font-size:18px}
.ds-btn.ds-active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue2)}
.ds-btn.ds-both{background:var(--green-bg);border-color:var(--green);color:var(--green-text)}
.wk-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin:0 16px 10px;overflow:hidden}
.wk-header{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.wk-title{font-size:17px;font-weight:600;color:var(--text)}
.wk-sub{font-size:12px;color:var(--text2);margin-top:2px}
.wk-sec-lbl{padding:6px 16px 3px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;border-top:0.5px solid var(--border)}
.ex-list{border-top:0.5px solid var(--border)}
.ex-item{padding:10px 16px;border-bottom:0.5px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ex-name{font-size:13px;font-weight:500;color:var(--text)}
.ex-note{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ex-sets{font-size:12px;color:var(--text2);font-family:var(--mono)}
.demo-btn{font-size:10px;padding:3px 7px;border-radius:6px;border:0.5px solid var(--border2);color:var(--text3)}
.ex-expl{margin-top:6px;background:var(--blue-bg);border-radius:var(--radius-sm);padding:7px 10px;font-size:11px;color:var(--blue2);line-height:1.5;border-left:2px solid var(--blue)}
.wt-blk{margin-top:7px;background:var(--bg3);border-radius:var(--radius-sm);padding:8px 10px}
.wt-sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wt-lbl{font-size:10px;color:var(--text3)}
.wt-val{font-size:13px;font-weight:500;color:var(--text2);font-family:var(--mono)}
.wt-trend{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.tr-up{background:var(--green-bg);color:var(--green-text)}
.tr-hold{background:var(--amber-bg);color:var(--amber2)}
.tr-down{background:var(--red-bg);color:var(--red)}
.tr-base{background:var(--bg4);color:var(--text3);border:0.5px solid var(--border2)}
.wt-ir{display:flex;align-items:center;gap:7px}
.wt-input{width:58px;padding:6px 8px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono)}
.wt-input:focus{outline:none;border-color:var(--green)}
.wt-unit{font-size:11px;color:var(--text3)}
.reps-lbl{font-size:10px;color:var(--text3);flex:1;text-align:right}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.btn-yes{background:var(--green2);color:#fff}
.btn-no{background:var(--red2);color:#fff}
.wt-logged{display:flex;align-items:center;gap:7px;font-size:12px;border-radius:var(--radius-sm);padding:6px 10px;margin-top:6px}
.logged-hit{background:var(--green-bg);color:var(--green-text)}
.logged-miss{background:var(--red-bg);color:var(--red)}
.skill-blk{margin-top:7px;background:var(--purple-bg);border-radius:var(--radius-sm);padding:8px 10px;border:0.5px solid #AFA9EC}
.skill-lbl{font-size:10px;color:var(--purple);font-weight:600;margin-bottom:4px}
.skill-row{display:flex;justify-content:space-between}
.skill-ns{font-size:11px;color:var(--purple2)}
.skill-tgt{font-size:10px;color:var(--purple)}
.skill-bar-bg{height:3px;background:#AFA9EC;border-radius:2px;margin-top:5px}
.skill-bar{height:3px;background:var(--purple);border-radius:2px}
.demo-area{display:none;padding:8px 0 2px}
.demo-area.open{display:block}
.demo-imgs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.demo-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--radius-sm);background:var(--bg3)}
.demo-cap{font-size:10px;color:var(--text3);text-align:center;margin-top:4px}
.tip-box{background:var(--blue-bg);border-top:0.5px solid #B5D4F4;padding:9px 16px;font-size:12px;color:var(--blue2);line-height:1.5}
.adapt-banner{background:var(--green-bg);border:0.5px solid #9FE1CB;border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;color:#085041;margin:0 16px 10px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.baseline-note{background:var(--amber-bg);border-top:0.5px solid #FAC775;padding:9px 16px;font-size:11px;color:var(--amber2);line-height:1.5}
.cta{width:calc(100% - 32px);margin:8px 16px 0;padding:14px;font-size:14px;font-weight:600;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:7px;border:none}
.cta-green{background:var(--green2);color:#fff}
.cta-purple{background:var(--purple2);color:#fff}
.cta-gray{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.leo-hero{background:var(--purple-bg);border:0.5px solid #AFA9EC;border-radius:var(--radius-lg);margin:0 16px 12px;padding:16px;display:flex;gap:14px;align-items:flex-start}
.leo-icon{width:42px;height:42px;border-radius:50%;background:var(--purple2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.leo-icon i{font-size:20px;color:#fff}
.leo-title{font-size:14px;font-weight:600;color:var(--text)}
.leo-sub{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}
.leo-btn{margin-top:9px;font-size:11px;font-weight:600;padding:7px 14px;border-radius:20px;background:var(--purple2);color:#fff;display:inline-flex;align-items:center;gap:5px;border:none}
.photo-nudge{background:var(--purple-bg);border:0.5px solid #AFA9EC;border-radius:var(--radius);margin:0 16px 10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.pn-icon{font-size:22px;color:var(--purple);flex-shrink:0;margin-top:1px}
.pn-title{font-size:13px;font-weight:600;color:var(--purple2)}
.pn-sub{font-size:11px;color:var(--purple);margin-top:2px;line-height:1.4}
.pn-btn{margin-top:8px;font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--purple2);color:#fff;display:inline-flex;align-items:center;gap:4px;border:none}
/* WORKOUT MODE */
#wMode{position:absolute;inset:0;background:var(--bg2);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#wMode.open{display:flex}
.wm-pips{display:flex;gap:4px;margin-bottom:24px;width:100%;max-width:320px}
.wm-pip{height:3px;border-radius:2px;flex:1;background:var(--bg3)}
.wm-pip.done{background:var(--green)}
.wm-pip.cur{background:var(--green);opacity:0.4}
.wm-ex{font-size:24px;font-weight:600;color:var(--text);text-align:center;line-height:1.2;margin-bottom:5px;letter-spacing:-0.3px;max-width:300px}
.wm-note{font-size:12px;color:var(--text2);text-align:center;margin-bottom:4px;line-height:1.4;max-width:280px}
.wm-sets{font-size:17px;font-weight:500;color:var(--green);text-align:center;font-family:var(--mono);margin-bottom:8px}
.wm-expl{background:var(--blue-bg);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--blue2);line-height:1.5;margin-bottom:12px;max-width:320px;width:100%;border-left:2px solid var(--blue);display:none}
.wm-wt{background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;width:100%;max-width:320px;display:none}
.wm-suggest{font-size:11px;color:var(--text3);margin-bottom:5px}
.wm-ir{display:flex;align-items:center;gap:8px;justify-content:center}
.wm-inp{width:76px;padding:9px;font-size:18px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono)}
.wm-inp:focus{outline:none;border-color:var(--green)}
.wm-unit{font-size:13px;color:var(--text3)}
.wm-timer{width:100%;max-width:320px;background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px}
.wm-timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.wm-timer-val{font-size:28px;font-weight:600;color:var(--text);font-family:var(--mono)}
.wm-timer-btns{display:flex;gap:6px}
.wm-tbtn{padding:6px 12px;font-size:11px;font-weight:600;border-radius:20px;border:none}
.wm-tstart{background:var(--green2);color:#fff}
.wm-treset{background:var(--bg4);color:var(--text2)}
.wm-tbar-bg{height:4px;background:var(--bg4);border-radius:2px}
.wm-tbar{height:4px;border-radius:2px;transition:width 1s linear}
.wm-reps-lbl{font-size:12px;color:var(--text3);text-align:center;margin-bottom:6px}
.wm-btns{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:6px}
.wm-btn{flex:1;padding:15px;border-radius:var(--radius);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;border:none}
.wm-yes{background:var(--green2);color:#fff}
.wm-no{background:var(--red2);color:#fff}
.wm-skip{font-size:12px;color:var(--text3);padding:8px;border-radius:var(--radius-sm)}
.wm-counter{font-size:11px;color:var(--text3);margin-top:4px}
.wm-close{position:absolute;top:52px;right:16px;font-size:12px;color:var(--text3);padding:8px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:none}
/* ACTIVITY */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.act-btn-item{padding:11px 8px;font-size:12px;font-weight:500;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s}
.act-btn-item i{font-size:19px}
.act-btn-item.sel{background:var(--blue-bg);border-color:var(--blue);color:var(--blue2)}
.custom-row{display:flex;gap:8px;padding:0 16px;margin-bottom:10px}
.custom-inp{flex:1;padding:9px 12px;font-size:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.custom-inp:focus{outline:none;border-color:var(--green)}
.custom-inp::placeholder{color:var(--text3)}
.add-btn{padding:9px 14px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2)}
.dur-chips{display:flex;gap:6px;padding:0 16px;margin-bottom:8px;flex-wrap:wrap}
.dur-chip{font-size:11px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text3);transition:all 0.15s;cursor:pointer}
.dur-chip.sel{background:var(--green-bg);border-color:var(--green);color:var(--green-text)}
.ra-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:8px}
.ra-btn{padding:13px 8px;font-size:12px;font-weight:600;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:center;transition:all 0.15s}
.ra-btn.sel{border-color:var(--green);color:var(--green-text);background:var(--green-bg)}
.confirm-log{width:calc(100% - 32px);margin:10px 16px 0;padding:13px;font-size:14px;font-weight:600;border-radius:var(--radius);background:var(--green2);color:#fff;border:none}
.confirm-log:disabled{opacity:0.3;cursor:default}
.logged-act-card{background:var(--green-bg);border:0.5px solid #9FE1CB;border-radius:var(--radius);padding:12px 14px;margin:0 16px 10px}
/* WEIGHTS */
.wt-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin:0 16px 8px}
.wt-cr{display:flex;justify-content:space-between;align-items:flex-start}
.wt-cn{font-size:13px;font-weight:500;color:var(--text)}
.wt-cm{font-size:10px;color:var(--text3);margin-top:2px}
.wt-nums{display:flex;gap:14px;margin-top:8px}
.wt-num{text-align:center}
.wt-nv{font-size:14px;font-weight:600;color:var(--text);font-family:var(--mono)}
.wt-nl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em}
.shoulder-btn{width:calc(100% - 32px);margin:4px 16px;padding:11px;font-size:12px;font-weight:500;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px}
.shoulder-btn.flagged{background:var(--red-bg);border-color:#F09595;color:var(--red)}
/* WEEK */
.vol-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.vol-card{background:var(--bg2);border-radius:var(--radius-sm);padding:9px 12px;border:0.5px solid var(--border)}
.vol-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.vol-val{font-size:14px;font-weight:600;color:var(--text);font-family:var(--mono);margin-bottom:4px}
.vol-bg{height:3px;background:var(--bg4);border-radius:2px}
.vol-bar{height:3px;border-radius:2px}
.wdi{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin:0 16px 6px;display:flex;justify-content:space-between;align-items:center}
.wdi.today-wdi{border-color:var(--blue)}
.wdi-n{font-size:13px;font-weight:500;color:var(--text)}
.wdi-s{font-size:11px;color:var(--text3);margin-top:1px}
/* PROGRESS */
.prog-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:12px}
.prog-stat{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;border:0.5px solid var(--border)}
.prog-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.prog-val{font-size:16px;font-weight:600;color:var(--text);font-family:var(--mono);margin-bottom:4px}
.prog-bg{height:3px;background:var(--bg4);border-radius:2px}
.prog-bar{height:3px;border-radius:2px}
.notes-inp{width:calc(100% - 32px);margin:0 16px;padding:12px;font-size:13px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);resize:none;line-height:1.5}
.notes-inp::placeholder{color:var(--text3)}
.notes-inp:focus{outline:none;border-color:var(--purple)}
.photo-upload{margin:10px 16px;border:0.5px dashed var(--border2);border-radius:var(--radius);padding:18px;text-align:center;background:var(--bg3);cursor:pointer}
.ai-result{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:10px 16px;font-size:13px;color:var(--text2);line-height:1.7}
.ai-result p{margin-bottom:8px}
.ai-result p:last-child{margin-bottom:0}
.check-btn{width:calc(100% - 32px);margin:10px 16px;padding:14px;font-size:14px;font-weight:600;border-radius:var(--radius);background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;border:none}
.check-btn:disabled{opacity:0.4;cursor:default}
/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:16px}
.photo-entry{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border);background:var(--bg3);position:relative}
.photo-entry img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.photo-meta{padding:7px 9px;font-size:11px;color:var(--text2)}
.photo-date{font-size:10px;color:var(--text3);margin-top:1px}
.photo-del{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--red);border:none;cursor:pointer}
.photo-add{width:calc(100% - 32px);margin:0 16px 14px;padding:14px;font-size:14px;font-weight:600;border-radius:var(--radius);border:0.5px dashed var(--border2);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.photo-storage{padding:0 16px;margin-bottom:12px}
.stor-bg{height:4px;background:var(--bg4);border-radius:2px}
.stor-fill{height:4px;border-radius:2px;background:var(--green)}
.stor-lbl{font-size:10px;color:var(--text3);margin-top:4px}
.photo-empty{padding:40px 16px;text-align:center}
.photo-empty i{font-size:40px;color:var(--text3);display:block;margin-bottom:12px}
.photo-empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px}
.photo-empty-sub{font-size:12px;color:var(--text3);line-height:1.5}
/* LIGHTBOX */
.lightbox{position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:120;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:70vh;border-radius:var(--radius);object-fit:contain}
.lb-date{font-size:13px;color:rgba(255,255,255,0.6);margin-top:12px;text-align:center}
.lb-note{font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;text-align:center}
.lb-close{margin-top:20px;padding:10px 24px;font-size:13px;font-weight:600;border-radius:20px;background:rgba(255,255,255,0.15);color:#fff;border:none;cursor:pointer}
/* PLAN OVERLAY */
.plan-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:90;display:none;align-items:flex-end;justify-content:center}
.plan-overlay.open{display:flex}
.plan-sheet{background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px 20px 40px;width:100%;max-width:430px;border-top:0.5px solid var(--border)}
.plan-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.plan-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.time-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.time-chip{font-size:12px;padding:8px 13px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all 0.15s;cursor:pointer}
.time-chip.sel{background:var(--green-bg);border-color:var(--green);color:var(--green-text)}
.plan-confirm{width:100%;padding:13px;font-size:14px;font-weight:600;border-radius:var(--radius);background:var(--green);color:#fff;border:none}
/* SHARE */
.share-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:90;display:none;align-items:center;justify-content:center;padding:20px}
.share-overlay.open{display:flex}
.share-card{background:var(--bg2);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:340px;border:0.5px solid var(--border)}
.share-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.share-title{font-size:15px;font-weight:600;color:var(--text)}
.share-date{font-size:11px;color:var(--text3)}
.share-streak{text-align:center;padding:16px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:14px}
.share-sv{font-size:48px;font-weight:600;color:var(--green);font-family:var(--mono);line-height:1}
.share-sl{font-size:12px;color:var(--text3);margin-top:4px}
.share-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.ss{text-align:center;padding:9px 5px;background:var(--bg3);border-radius:var(--radius-sm)}
.ss-val{font-size:15px;font-weight:600;color:var(--text);font-family:var(--mono)}
.ss-lbl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.share-btn{padding:11px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);text-align:center;border:none;cursor:pointer}
.share-copy{background:var(--green2);color:#fff}
.share-close{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
/* TOASTS */
.milestone-toast{position:absolute;top:76px;left:16px;right:16px;background:var(--bg2);border:0.5px solid var(--green);border-radius:var(--radius);padding:13px 15px;z-index:95;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.milestone-toast.show{display:block;animation:slideDown 0.3s ease}
.mt-title{font-size:13px;font-weight:600;color:var(--green);margin-bottom:2px}
.mt-body{font-size:12px;color:var(--text2);line-height:1.5}
.undo-toast{position:absolute;bottom:96px;left:16px;right:16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:11px 15px;z-index:95;display:none;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.undo-toast.show{display:flex;animation:slideUp 0.3s ease}
.undo-text{font-size:13px;color:var(--text2)}
.undo-ok{font-size:12px;font-weight:600;color:var(--green);border:none;background:none}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script>
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const today=new Date();
const DOW=today.getDay();

const EXPLANATIONS={
  'Barbell back squat':'<strong>Top set + back-off sets:</strong> Warm up gradually, then lift your suggested weight for 5 reps (top set). Drop 10–15% and do remaining sets at that lighter weight, aiming for 6–8 reps each.',
  'Barbell bench press':'<strong>Top set + back-off sets:</strong> Work up to your suggested weight for 5 reps (top set). Drop 10–15% and complete remaining sets for 6–8 reps each.',
  'Romanian deadlift':'<strong>Feel the stretch:</strong> Push hips back, keep back flat, lower until you feel a strong hamstring pull — usually just below the knee. No bouncing at the bottom.',
  'Bulgarian split squat':'<strong>Setup:</strong> Rear foot on bench, front foot forward enough that your knee stays behind your toes when you lower. Drive up through your front heel.',
  'Dumbbell hip thrust':'<strong>Two dumbbells:</strong> One on each hip, hold in place with your hands. Upper back on bench. Drive hips up explosively, hard glute squeeze at top, lower with control.',
  'L-sit progression':'<strong>Tuck L-sit first:</strong> Grip dumbbells on the floor, lift knees to chest and hold. Work toward straightening one leg, then both. Max hold time each set.',
  'Handstand wall hold':'<strong>Safe kick-up:</strong> Hands shoulder-width from wall, kick one leg up and let the other follow. Core tight, arms straight. Build to 30 sec holds consistently.',
  'Dead bug':'<strong>Back stays down:</strong> Press lower back firmly to the floor throughout. Extend opposite arm and leg slowly, return, switch. Stop if your back lifts.',
  'Weighted pull-ups':'<strong>Full range:</strong> Start from dead hang — arms fully extended. Pull until chin clears the bar. Add weight once bodyweight for 8+ reps is easy.',
  'Ab wheel rollout':'<strong>No ab wheel?</strong> Use two dumbbells as handles on the floor — identical movement. Keep your core braced and lower back flat throughout.',
};

const DEMOS={
  'Barbell bench press':['https://cdn.jefit.com/assets/img/exercises/gifs/2.gif'],
  'Incline dumbbell press':['https://cdn.jefit.com/assets/img/exercises/gifs/35.gif'],
  'Weighted pull-ups':['https://cdn.jefit.com/assets/img/exercises/gifs/57.gif'],
  'Chest-supported DB row':['https://cdn.jefit.com/assets/img/exercises/gifs/89.gif'],

  'Chin-ups':['https://cdn.jefit.com/assets/img/exercises/gifs/836.gif'],

};

const LIFTS={
  'Barbell bench press':{cat:'upper',startLb:95,inc:2.5,reps:'5–8',shoulder:true},
  'Incline dumbbell press':{cat:'upper',startLb:30,inc:2.5,reps:'10–12',shoulder:true},
  'Weighted pull-ups':{cat:'upper',startLb:0,inc:2.5,reps:'6–8',note:'0 = bodyweight'},
  'Chest-supported DB row':{cat:'upper',startLb:35,inc:2.5,reps:'10–12'},
  'Dumbbell lateral raise':{cat:'upper',startLb:12,inc:2.5,reps:'15'},
  'Dumbbell floor press':{cat:'upper',startLb:35,inc:2.5,reps:'10–12',shoulder:true},
  'Single-arm DB row':{cat:'upper',startLb:40,inc:2.5,reps:'10'},
  'Chin-ups':{cat:'upper',startLb:0,inc:2.5,reps:'max',note:'0 = bodyweight'},
  'Dumbbell curl':{cat:'upper',startLb:20,inc:2.5,reps:'12'},
  'Overhead tricep ext.':{cat:'upper',startLb:25,inc:2.5,reps:'12'},
  'Barbell back squat':{cat:'lower',startLb:95,inc:5,reps:'5–8'},
  'Romanian deadlift':{cat:'lower',startLb:95,inc:5,reps:'10'},
  'Bulgarian split squat':{cat:'lower',startLb:25,inc:5,reps:'8–10',note:'per hand'},
  'Dumbbell hip thrust':{cat:'lower',startLb:30,inc:5,reps:'10',note:'two dumbbells, one each hip'},
};

const REST={default:90,'Barbell back squat':180,'Barbell bench press':150,'Romanian deadlift':150,'Dumbbell hip thrust':120,'Bulgarian split squat':120,'Weighted pull-ups':150,'Chin-ups':150};

const PROG={
  0:{name:'Rest + walk',badge:'b-rest',badgeText:'Rest',duration:'As desired',isRest:true,sections:[{label:'Guidelines',ex:[{n:'Walking',note:'Town walk, easy pace.',s:'As desired',nw:true},{n:'Optional stretch',note:'Hips, lats, chest opener.',s:'10–15 min',nw:true}]}],tip:'Rest is when you grow. Protect your sleep and eat enough.'},
  1:{name:'Upper strength',badge:'b-lift',badgeText:'Lift',duration:'50–60 min',sections:[
    {label:'Warm-up',ex:[{n:'Rowing machine',note:'Easy pace, posture focus.',s:'5 min',nw:true},{n:'Band pull-aparts',note:'Rotator cuff prep — always.',s:'2×15',nw:true}]},
    {label:'Main strength',ex:[{n:'Barbell bench press',note:'Top set of 5, then back-off sets at 85–90% of that weight.',s:'4×5–8'},{n:'Incline dumbbell press',note:'30–45° incline. Upper chest priority.',s:'3×10–12'},{n:'Weighted pull-ups',note:'Full hang to chin over bar. Add weight when 8+ reps is easy.',s:'4×6–8'},{n:'Chest-supported DB row',note:'Lie on incline bench. Full stretch at bottom.',s:'3×10–12'},{n:'Dumbbell lateral raise',note:'Strict form, no swinging. Builds shoulder width.',s:'4×15'},{n:'Face pulls',note:'External rotation. Protects supraspinatus — never skip.',s:'3×15',nw:true}]}
  ],tip:'No overhead pressing. Lateral raises and incline press build shoulder width without loading the supraspinatus.'},
  2:{name:'LeoMoves flow',badge:'b-leo',badgeText:'Leo',duration:'35–50 min',isLeo:true,sections:[
    {label:'Main session',ex:[{n:'LeoMoves app session',note:'Bodyweight 2.0 or movement flow. Hit play and follow along.',s:'30–40 min',nw:true,isLeoMain:true}]},
    {label:'Skill work (5–10 min after)',ex:[{n:'L-sit progression',note:'Tuck L-sit on dumbbells. Work toward full L-sit over weeks.',s:'3×max hold',nw:true,isSkill:true,skillKey:'lsit',skillLabel:'Tuck L-sit → full L-sit'},{n:'Handstand wall hold',note:'Kick up to wall. Work toward freestanding over months.',s:'3×20–30 sec',nw:true,isSkill:true,skillKey:'handstand',skillLabel:'Wall hold → freestanding'}]}
  ],tip:'Movement quality day. This is what gives the Leo physique its athletic, lived-in look.'},
  3:{name:'Lower strength',badge:'b-lift',badgeText:'Lift',duration:'55 min',sections:[
    {label:'Warm-up',ex:[{n:'Rowing machine',note:'Build intensity over 5 min.',s:'5 min',nw:true},{n:'Goblet squat + hip stretch',note:'Mobility prep, 2 rounds.',s:'2×10',nw:true}]},
    {label:'Main strength',ex:[{n:'Barbell back squat',note:'Top set of 5, then back-off sets at 85–90% of that weight.',s:'4×5–8'},{n:'Romanian deadlift',note:'Push hips back, feel the hamstring stretch. Lower to just below knee.',s:'3×10'},{n:'Bulgarian split squat',note:'Rear foot on bench. Drive up through front heel.',s:'3×8–10 each'},{n:'Dumbbell hip thrust',note:'One dumbbell each hip. Upper back on bench. Full glute squeeze at top.',s:'3×10'}]},
    {label:'Core',ex:[{n:'Dead bug',note:'Lower back pressed to floor throughout. Extend opposite arm and leg slowly.',s:'3×8 each',nw:true},{n:'Ab wheel rollout',note:'No wheel? Use two dumbbells as handles on the floor.',s:'3×8–10',nw:true}]}
  ],tip:'No calf raises or plyometrics — Achilles history.'},
  4:{name:'Sport day',badge:'b-surf',badgeText:'Active',duration:'1–2 hrs',isRest:true,sections:[{label:'Your sport',ex:[{n:'Cycling, surfing, hiking',note:'Normal outing. Log it in the Activity tab.',s:'1–2 hrs',nw:true},{n:'Optional: Leo mobility',note:'10 min post-activity if energy allows.',s:'10 min',nw:true}]}],tip:'Log your activity in the Activity tab — your workout adapts automatically. Or switch to At-home above.'},
  5:{name:'Upper strength + Leo',badge:'b-combo',badgeText:'Combo',duration:'~65 min',sections:[
    {label:'Strength (45 min)',ex:[{n:'Dumbbell floor press',note:'Shoulder friendly. Full range of motion.',s:'4×10–12'},{n:'Single-arm DB row',note:'Heavy. Full stretch at bottom for back thickness.',s:'4×10 each'},{n:'Chin-ups',note:'Supinated grip. Add weight if 10+ easy.',s:'3×max'},{n:'Dumbbell curl',note:'Alternate arms, full supination at top.',s:'3×12'},{n:'Overhead tricep ext.',note:'Both hands on one dumbbell, elbows in.',s:'3×12'},{n:'Face pulls',note:'Always finish upper sessions with these.',s:'3×15',nw:true}]},
    {label:'LeoMoves finisher (15 min)',ex:[{n:'LeoMoves flow',note:'Short follow-along from the app.',s:'15 min',nw:true}]}
  ],tip:'Strength then flow — lifting builds the muscle, movement builds body control.'},
  6:{name:'Sport + Leo',badge:'b-combo',badgeText:'Combo',duration:'As desired',isRest:true,sections:[{label:'Sport first',ex:[{n:'Cycling or surfing',note:'Your normal outing.',s:'1–2 hrs',nw:true}]},{label:'LeoMoves (optional)',ex:[{n:'Mobility + movement combo',note:'Only if energy allows. 20–30 min.',s:'20–30 min',nw:true}]}],tip:"Saturday Leo is optional. If you surfed hard, that's enough."}
};

function pickAtHome(){
  // Look at what's been done this week and fill the gap
  const done={upper:false,lower:false,leo:false};
  for(let i=0;i<7;i++){
    if(i===DOW)continue;
    const d=new Date(today);d.setDate(today.getDate()-DOW+i);
    if(S.completedDays[gk(d)]){
      if(i===1||i===5)done.upper=true;
      if(i===3)done.lower=true;
      if(i===2)done.leo=true;
    }
  }
  if(!done.lower)return{...PROG[3],swapped:true,swapReason:'Lower strength — filling your week gap'};
  if(!done.upper)return{...PROG[1],swapped:true,swapReason:'Upper strength — filling your week gap'};
  if(!done.leo)return{...PROG[2],swapped:true,swapReason:'LeoMoves — filling your week gap'};
  return{...PROG[1],swapped:true,swapReason:'Upper strength — default at-home pick'};
}

function loadState(){try{const s=localStorage.getItem('trainState');return s?JSON.parse(s):ds();}catch(e){return ds();}}
function ds(){return{streak:0,best:0,shields:0,totalWeeks:0,completedDays:{},activityLog:{},weights:{},skillProgress:{lsit:20,handstand:10},shoulderFlagged:false,photoLastTaken:null,uploadedPhoto:null,photos:[],weekHistory:[],planTime:null,lastAction:null,milestonesSeen:[],selectedPlanTime:null,dayMode:{},homeWorkout:null};}
let S=loadState();
function save(){try{localStorage.setItem('trainState',JSON.stringify(S));}catch(e){alert('Storage full. Try deleting old photos.');}}
function gk(d){return(d instanceof Date?d:new Date(d)).toISOString().split('T')[0];}
function todayKey(){return gk(today);}

function getSuggested(name){
  const lift=LIFTS[name];if(!lift)return null;
  const w=S.weights[name];
  if(!w||w.sessions<2)return{weight:lift.startLb,phase:'baseline',label:'Starting weight'};
  if(S.shoulderFlagged&&lift.shoulder){return{weight:Math.round(w.current*0.85/2.5)*2.5,phase:'reduced',label:'Shoulder deload'};}
  if(w.missStreak>=2){return{weight:Math.round(w.current*0.9/2.5)*2.5,phase:'deload',label:'Deload −10%'};}
  if(w.hitLast)return{weight:w.current+lift.inc,phase:'progress',label:`Progress +${lift.inc}lb`};
  return{weight:w.current,phase:'hold',label:'Hold — hit your reps first'};
}
function logWeight(name,weight,hit){
  S.lastAction={type:'weight',name,prev:S.weights[name]?{...S.weights[name]}:null};
  if(!S.weights[name])S.weights[name]={current:weight,sessions:0,missStreak:0,hitLast:false,history:[]};
  const w=S.weights[name];
  w.history.push({date:todayKey(),weight,hit});
  w.current=weight;w.sessions++;w.hitLast=hit;
  if(!hit)w.missStreak++;else w.missStreak=0;
  save();showUndo(`${name} — ${weight}lb ${hit?'✓':'✗'} undone`);checkMilestones();
}

function getDayMode(){return S.dayMode[todayKey()]||'scheduled';}
function setDayMode(mode){
  S.dayMode[todayKey()]=mode;
  if(mode==='home'||mode==='both')S.homeWorkout=pickAtHome();
  save();renderHome();
}
function getTodayWorkout(){
  const mode=getDayMode();
  if(S.adaptedToday&&mode==='scheduled')return S.adaptedToday;
  if(mode==='home'||mode==='both')return S.homeWorkout||pickAtHome();
  return PROG[DOW];
}

function getAdapted(type,duration,intensity,label){
  const hard=intensity==='Hard'||intensity==='Epic session';
  const long=duration==='1.5 hrs'||duration==='2+ hrs';
  const surf=type==='surf'||type==='wing'||type==='swim';
  const legs=type==='hike'||type==='ski'||type==='run'||type==='ride';
  if(hard||long)return{name:'Active recovery',badge:'b-adapted',badgeText:'Adapted',duration:'15–20 min',sections:[{label:'Recovery',ex:[{n:'LeoMoves mobility flow',note:'Hips, thoracic, shoulders.',s:'10–15 min',nw:true},{n:'Face pulls',note:'Shoulder health.',s:'3×15',nw:true},{n:'Dead bug',note:'Core maintenance.',s:'2×8 each',nw:true}]}],tip:'You already did the work. This keeps mobility up without digging into recovery.',banner:`${label} (${duration}, ${intensity}) — full session swapped for recovery.`};
  if(surf)return{name:'Skill + shoulder maintenance',badge:'b-adapted',badgeText:'Adapted',duration:'30 min',sections:[{label:'Scaled upper work',ex:[{n:'Weighted pull-ups',note:'Bodyweight only today.',s:'3×sub-max'},{n:'Dumbbell lateral raise',note:'Light.',s:'3×15'},{n:'Face pulls',note:'',s:'3×15',nw:true}]}],tip:'Paddling already gave you pull volume.',banner:`${label} (${duration}, ${intensity}) — upper strength scaled.`};
  if(legs)return{name:'Upper skill + core',badge:'b-adapted',badgeText:'Adapted',duration:'35 min',sections:[{label:'Upper + core only',ex:[{n:'Weighted pull-ups',note:'Bodyweight. Sub-max.',s:'3×sub-max'},{n:'Dumbbell lateral raise',note:'Light.',s:'3×15'},{n:'Face pulls',note:'',s:'3×15',nw:true},{n:'Dead bug',note:'',s:'3×8 each',nw:true}]}],tip:`${label} hit your legs. Upper-only today.`,banner:`${label} (${duration}, ${intensity}) — leg work removed.`};
  return{name:'Light skill work',badge:'b-adapted',badgeText:'Adapted',duration:'25 min',sections:[{label:'Maintenance',ex:[{n:'LeoMoves mobility flow',note:'Follow along.',s:'20 min',nw:true},{n:'Face pulls',note:'',s:'3×15',nw:true}]}],tip:'Light day.',banner:`${label} (${duration}, ${intensity}) — scaled to maintenance.`};
}

const MILESTONES=[
  {id:'first',check:()=>S.streak>=1,title:'First session logged 🎉',body:'Every journey starts here.'},
  {id:'week1',check:()=>S.streak>=7,title:'One week straight 🔥',body:'Seven days. Habit is forming.'},
  {id:'w10',check:()=>Object.values(S.weights).some(w=>w.sessions>=3),title:'Weights dialled in ⚡',body:'Your baseline is set. Progressive overload starts now.'},
  {id:'s20',check:()=>Object.keys(S.completedDays).length>=20,title:'20 sessions logged 💪',body:'This is past where most people quit.'},
  {id:'streak14',check:()=>S.streak>=14,title:'Two weeks unbroken 🏆',body:'The compounding effect is real now.'},
  {id:'streak30',check:()=>S.streak>=30,title:'30-day streak 🌟',body:'One month. This is who you are now.'},
];
function checkMilestones(){MILESTONES.forEach(m=>{if(!S.milestonesSeen.includes(m.id)&&m.check()){S.milestonesSeen.push(m.id);save();setTimeout(()=>{document.getElementById('mTitle').textContent=m.title;document.getElementById('mBody').textContent=m.body;const t=document.getElementById('mToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);},800);}});}

let lastShake=0;
function setupShake(){
  if(!window.DeviceMotionEvent)return;
  function handle(e){const a=e.accelerationIncludingGravity;if(!a)return;const mag=Math.sqrt(a.x**2+a.y**2+a.z**2);const now=Date.now();if(mag>25&&now-lastShake>1200){lastShake=now;undoLast();}}
  const req=DeviceMotionEvent.requestPermission;
  if(typeof req==='function'){document.addEventListener('click',()=>{req().then(r=>{if(r==='granted')window.addEventListener('devicemotion',handle);}).catch(()=>{});},{once:true});}
  else{window.addEventListener('devicemotion',handle);}
}
function undoLast(){
  if(!S.lastAction)return;
  const a=S.lastAction;
  if(a.type==='complete'){delete S.completedDays[a.date];S.streak=Math.max(0,S.streak-1);S.lastAction=null;save();showUndo('Day completion undone');renderHome();}
  else if(a.type==='weight'){if(a.prev)S.weights[a.name]={...a.prev};else delete S.weights[a.name];S.lastAction=null;save();showUndo(`${a.name} weight undone`);renderHome();}
  else if(a.type==='activity'){delete S.activityLog[a.date];S.adaptedToday=null;S.lastAction=null;save();showUndo('Activity undone');renderHome();renderActivity();}
}
function showUndo(msg){document.getElementById('uText').textContent=msg;const t=document.getElementById('uToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function hideUndo(){document.getElementById('uToast').classList.remove('show');}

function nav(screen){

  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const map={home:'homeScreen',activity:'activityScreen',weights:'weightsScreen',week:'weekScreen',progress:'progressScreen',photos:'photosScreen'};
  document.getElementById(map[screen])?.classList.add('active');
  document.getElementById('nav-'+screen)?.classList.add('active');
  if(screen==='home')renderHome();
  if(screen==='activity')renderActivity();
  if(screen==='weights')renderWeights();
  if(screen==='week')renderWeek();
  if(screen==='progress')renderProgress();
  if(screen==='photos')renderPhotos();
}

  if(act)h+=`<div class="adapt-banner"><i class="ti ti-check" style="font-size:13px;flex-shrink:0;margin-top:1px"></i><span>${act.label} logged (${act.duration}, ${act.intensity})${mode==='both'?' · at-home workout showing below':' · workout adapted'}</span></div>`;

  <div class="day-switch">

    <button class="ds-btn${mode==='home'?' ds-active':''}" onclick="setDayMode('home')"><i class="ti ti-home"></i>At-home</button>
    <button class="ds-btn${mode==='both'?' ds-both':''}" onclick="setDayMode('both')"><i class="ti ti-plus"></i>Both</button>
  </div>
  <div style="padding:0 16px;font-size:11px;color:var(--text3);margin-bottom:10px;line-height:1.4">${mode==='scheduled'?'Following the program. Tap At-home to switch, or Both to do both today.':mode==='home'?`Smart pick: ${workout.swapReason||'best fit for your week'}.`:'Do at-home workout + outdoor activity in any order today.'}</div>`;

  if(workout.isLeo)h+=`<div class="leo-hero"><div class="leo-icon"><i class="ti ti-player-play"></i></div><div><div class="leo-title">LeoMoves app session</div><div class="leo-sub">Bodyweight 2.0 or movement flow. Hit play and follow along. 30–40 min.</div><button class="leo-btn" onclick="window.open('https://leomoves.com','_blank')"><i class="ti ti-external-link" style="font-size:11px"></i>Open LeoMoves</button></div></div>`;
  if(workout.banner)h+=`<div class="adapt-banner"><i class="ti ti-refresh" style="font-size:13px;flex-shrink:0;margin-top:1px"></i><span>${workout.banner}</span></div>`;

  if(S.totalWeeks<2&&!workout.isRest&&!workout.isLeo)h+=`<div class="baseline-note"><i class="ti ti-info-circle" style="font-size:11px;margin-right:4px;vertical-align:-1px"></i>Baseline phase — log what you lift. Targets start week 3.</div>`;

function buildExRow(e){
  const hasWt=!e.nw&&LIFTS[e.n];
  const sugg=hasWt?getSuggested(e.n):null;
  const logged=hasWt&&S.weights[e.n]?.history?.find(h=>h.date===todayKey());
  const rowId='ex'+e.n.replace(/[^a-z0-9]/gi,'').toLowerCase().slice(0,14);
  const expl=EXPLANATIONS[e.n];
  let h=`<div class="ex-item" id="${rowId}"><div class="ex-top"><div class="exl"><div class="ex-name">${e.n}</div>${e.note?`<div class="ex-note">${e.note}</div>`:''}</div><div class="ex-right"><span class="ex-sets">${e.s}</span><button class="demo-btn" onclick="showDemo('${e.n.replace(/'/g,"\\'")}','${rowId}')"><i class="ti ti-photo" style="font-size:10px"></i></button></div></div>`;
  if(expl)h+=`<div class="ex-expl"><i class="ti ti-info-circle" style="font-size:11px;margin-right:4px;vertical-align:-1px"></i>${expl}</div>`;
  if(e.isSkill){const p=S.skillProgress[e.skillKey]||0;h+=`<div class="skill-blk"><div class="skill-lbl">Skill progress</div><div class="skill-row"><span class="skill-ns">${e.skillLabel?.split('→')[0]||e.n}</span><span class="skill-tgt">→ ${e.skillLabel?.split('→')[1]?.trim()||'advanced'}</span></div><div class="skill-bar-bg"><div class="skill-bar" style="width:${p}%"></div></div></div>`;}
  if(sugg&&!logged){
    const tc=sugg.phase==='progress'?'tr-up':sugg.phase==='deload'||sugg.phase==='reduced'?'tr-down':sugg.phase==='baseline'?'tr-base':'tr-hold';
    h+=`<div class="wt-blk"><div class="wt-sr"><div><div class="wt-lbl">Suggested</div><div class="wt-val">${sugg.weight} lb</div></div><span class="wt-trend ${tc}">${sugg.label}</span></div><div class="wt-ir"><input type="number" class="wt-input" id="wi-${rowId}" value="${sugg.weight}" min="0" max="500" step="2.5" inputmode="decimal"/><span class="wt-unit">lb</span><span class="reps-lbl">Hit reps?</span><button class="icon-btn btn-yes" onclick="logWt('${e.n}','${rowId}',true)"><i class="ti ti-check"></i></button><button class="icon-btn btn-no" onclick="logWt('${e.n}','${rowId}',false)"><i class="ti ti-x"></i></button></div>`;
    if(LIFTS[e.n]?.shoulder)h+=`<button onclick="toggleShoulder()" style="margin-top:6px;font-size:10px;padding:3px 8px;border-radius:20px;border:0.5px solid ${S.shoulderFlagged?'#F09595':'var(--border2)'};background:${S.shoulderFlagged?'var(--red-bg)':'transparent'};color:${S.shoulderFlagged?'var(--red)':'var(--text3)'}"><i class="ti ti-alert-triangle" style="font-size:10px;margin-right:3px"></i>${S.shoulderFlagged?'Shoulder flagged':'Flag shoulder'}</button>`;
    h+=`</div>`;
  } else if(logged){
    h+=`<div class="wt-logged ${logged.hit?'logged-hit':'logged-miss'}"><i class="ti ti-${logged.hit?'check':'x'}" style="font-size:13px"></i>${logged.weight}lb — ${logged.hit?'reps hit ↗':'missed reps · hold next session'}</div>`;
  }
  h+=`<div class="demo-area" id="demo-${rowId}"></div></div>`;
  return h;
}

function logWt(name,rowId,hit){

function markComplete(){
  S.lastAction={type:'complete',date:todayKey(),prevStreak:S.streak};
  S.completedDays[todayKey()]=true;
  S.streak++;if(S.streak>S.best)S.best=S.streak;

// WORKOUT MODE
let wmList=[],wmIdx=0,timerInterval=null,timerRemaining=0,timerTotal=0,timerRunning=false;

function startWM(){
  const p=getTodayWorkout();
  wmList=[];p.sections.forEach(sec=>sec.ex.forEach(e=>{if(!e.isLeoMain)wmList.push(e);}));
  wmIdx=0;timerRunning=false;timerRemaining=0;clearInterval(timerInterval);
  document.getElementById('wMode').classList.add('open');
  renderWMEx();
}
function closeWM(){document.getElementById('wMode').classList.remove('open');clearInterval(timerInterval);}

function renderWMEx(){
  if(wmIdx>=wmList.length){closeWM();markComplete();return;}
  const e=wmList[wmIdx];
  document.getElementById('wmPips').innerHTML=Array.from({length:wmList.length},(_,i)=>`<div class="wm-pip${i<wmIdx?' done':i===wmIdx?' cur':''}"></div>`).join('');
  document.getElementById('wmEx').textContent=e.n;
  document.getElementById('wmNote').textContent=e.note||'';
  document.getElementById('wmSets').textContent=e.s;
  document.getElementById('wmCounter').textContent=`${wmIdx+1} of ${wmList.length}`;
  const expl=EXPLANATIONS[e.n];
  const explEl=document.getElementById('wmExpl');
  if(expl){explEl.innerHTML=`<i class="ti ti-info-circle" style="font-size:11px;margin-right:4px;vertical-align:-1px"></i>${expl}`;explEl.style.display='block';}else{explEl.style.display='none';}
  const sugg=!e.nw&&LIFTS[e.n]?getSuggested(e.n):null;
  const wtEl=document.getElementById('wmWt');
  if(sugg){
    const tc=sugg.phase==='progress'?'tr-up':sugg.phase==='deload'||sugg.phase==='reduced'?'tr-down':sugg.phase==='baseline'?'tr-base':'tr-hold';
    wtEl.innerHTML=`<div class="wm-suggest">Suggested: <strong>${sugg.weight} lb</strong> · <span class="wt-trend ${tc}" style="font-size:9px">${sugg.label}</span></div><div class="wm-ir"><input type="number" class="wm-inp" id="wmWtInp" value="${sugg.weight}" step="2.5" inputmode="decimal"/><span class="wm-unit">lb</span></div>`;
    wtEl.style.display='block';
    document.getElementById('wmRL').textContent='Hit your reps?';
    document.getElementById('wmBtns').innerHTML=`<button class="wm-btn wm-yes" onclick="wmLogWt(true)"><i class="ti ti-check"></i> Yes</button><button class="wm-btn wm-no" onclick="wmLogWt(false)"><i class="ti ti-x"></i> No</button>`;
  } else {
    wtEl.style.display='none';
    document.getElementById('wmRL').textContent='';
    document.getElementById('wmBtns').innerHTML=`<button class="wm-btn wm-yes" style="width:100%;max-width:280px" onclick="wmNext()"><i class="ti ti-check"></i> Done</button>`;
  }
  const restSec=REST[e.n]||REST.default;
  timerTotal=restSec;timerRemaining=restSec;timerRunning=false;clearInterval(timerInterval);
  document.getElementById('wmTBtn').textContent='Start rest';
  document.getElementById('wmTBtn').className='wm-tbtn wm-tstart';
  updateTimerUI();
}

function wmLogWt(hit){
  const e=wmList[wmIdx];
  const inp=document.getElementById('wmWtInp');
  if(inp)logWeight(e.n,parseFloat(inp.value||0),hit);
  // Auto-start rest timer
  if(!timerRunning)toggleTimer();
}

function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('wmTBtn').textContent='Resume';
    document.getElementById('wmTBtn').className='wm-tbtn wm-treset';
  } else {
    if(timerRemaining<=0)timerRemaining=timerTotal;
    timerRunning=true;
    document.getElementById('wmTBtn').textContent='Pause';
    document.getElementById('wmTBtn').className='wm-tbtn wm-treset';
    timerInterval=setInterval(()=>{
      timerRemaining--;updateTimerUI();
      if(timerRemaining<=0){
        clearInterval(timerInterval);timerRunning=false;
        if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
        document.getElementById('wmTBtn').textContent='Go!';
        document.getElementById('wmTBtn').className='wm-tbtn wm-tstart';
      }
    },1000);
  }
}

function resetTimer(){
  clearInterval(timerInterval);timerRunning=false;timerRemaining=timerTotal;
  document.getElementById('wmTBtn').textContent='Start rest';
  document.getElementById('wmTBtn').className='wm-tbtn wm-tstart';
  updateTimerUI();
}

function updateTimerUI(){
  const m=Math.floor(timerRemaining/60);const s=timerRemaining%60;
  document.getElementById('wmTVal').textContent=timerRemaining>0?`${m}:${s.toString().padStart(2,'0')}`:'Go!';
  const pct=timerTotal>0?Math.round(timerRemaining/timerTotal*100):0;
  const bar=document.getElementById('wmTBar');
  bar.style.width=pct+'%';
  bar.style.background=timerRemaining<10?'var(--red)':timerRemaining<30?'var(--amber)':'var(--green)';
}

function wmNext(){clearInterval(timerInterval);timerRunning=false;wmIdx++;renderWMEx();}

let selAct=null,selActLabel=null,selDur=null,selInt=null,raMode='replace';

function renderActivity(){
  const logged=S.activityLog[todayKey()];
  let h=`<div class="page-header"><div class="page-title">Log activity</div><div class="page-sub">Outdoor activities — surf, ride, hike, or anything else</div></div>`;
  if(logged){
    h+=`<div class="logged-act-card"><div style="font-size:14px;font-weight:600;color:var(--green-text)"><i class="ti ti-check" style="font-size:14px;margin-right:6px"></i>${logged.label} logged</div><div style="font-size:12px;color:var(--green-text);margin-top:3px;opacity:0.8">${logged.duration} · ${logged.intensity}</div><button onclick="clearAct()" style="margin-top:10px;font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:0.5px solid #9FE1CB;background:transparent;color:var(--green2)">Log different activity</button></div>`;
    h+=`<div style="padding:0 16px;margin-top:4px"><button onclick="nav('home')" style="width:100%;padding:12px;font-size:13px;font-weight:500;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-arrow-left" style="font-size:14px"></i>Back to today's workout</button></div>`;
  } else {
    h+=`<div class="slbl">What did you do?</div>
    <div class="act-grid">
      <button class="act-btn-item${selAct==='surf'?' sel':''}" onclick="selA('surf','Surf')"><i class="ti ti-wave-sine"></i>Surf</button>
      <button class="act-btn-item${selAct==='ride'?' sel':''}" onclick="selA('ride','Cycle')"><i class="ti ti-bike"></i>Cycle</button>
      <button class="act-btn-item${selAct==='hike'?' sel':''}" onclick="selA('hike','Hike')"><i class="ti ti-mountain"></i>Hike</button>
      <button class="act-btn-item${selAct==='ski'?' sel':''}" onclick="selA('ski','Ski / snowboard')"><i class="ti ti-snowflake"></i>Ski / snowboard</button>
      <button class="act-btn-item${selAct==='wing'?' sel':''}" onclick="selA('wing','Wingfoil')"><i class="ti ti-wind"></i>Wingfoil</button>
      <button class="act-btn-item${selAct==='run'?' sel':''}" onclick="selA('run','Run')"><i class="ti ti-run"></i>Run</button>
      <button class="act-btn-item${selAct==='group'?' sel':''}" onclick="selA('group','Group workout')"><i class="ti ti-users"></i>Group workout</button>
      <button class="act-btn-item${selAct==='swim'?' sel':''}" onclick="selA('swim','Swim')"><i class="ti ti-ripple"></i>Swim</button>
    </div>
    <div class="custom-row"><input class="custom-inp" id="customInp" placeholder="Something else? Type it…" maxlength="30"/><button class="add-btn" onclick="addCustomAct()"><i class="ti ti-plus" style="font-size:13px;vertical-align:-1px"></i> Add</button></div>`;
    if(selAct){
      h+=`<div class="slbl">How long?</div><div class="dur-chips">${['< 1 hr','1 hr','1.5 hrs','2+ hrs'].map(d=>`<span class="dur-chip${selDur===d?' sel':''}" onclick="selD('${d}')">${d}</span>`).join('')}</div>`;
      h+=`<div class="slbl">How was it?</div><div class="dur-chips">${['Mellow','Moderate','Hard','Epic session'].map(i=>`<span class="dur-chip${selInt===i?' sel':''}" onclick="selI('${i}')">${i}</span>`).join('')}</div>`;
      const p=PROG[DOW];
      if(!p.isRest){
        h+=`<div class="slbl">Today's workout</div>
        <div class="ra-row">
          <button class="ra-btn${raMode==='replace'?' sel':''}" onclick="setRA('replace')"><i class="ti ti-refresh" style="font-size:14px;display:block;margin:0 auto 4px"></i>Replace workout</button>
          <button class="ra-btn${raMode==='add'?' sel':''}" onclick="setRA('add')"><i class="ti ti-plus" style="font-size:14px;display:block;margin:0 auto 4px"></i>Add to workout</button>
        </div>
        <div style="padding:0 16px;font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:4px">${raMode==='replace'?'Workout adapts based on your activity.':'Both logged — do them in any order today.'}</div>`;
      }
      h+=`<button class="confirm-log" onclick="confirmLog()" ${(!selDur||!selInt)?'disabled':''}>Log & ${raMode==='replace'?'adapt plan':'add to plan'}</button>`;
    }
  }
  h+=`<div style="height:16px"></div>`;
  document.getElementById('activityScreen').innerHTML=h;
}

function selA(type,label){selAct=type;selActLabel=label;renderActivity();}
function selD(v){selDur=v;renderActivity();}
function selI(v){selInt=v;renderActivity();}
function setRA(v){raMode=v;renderActivity();}
function clearAct(){selAct=null;selActLabel=null;selDur=null;selInt=null;delete S.activityLog[todayKey()];S.adaptedToday=null;save();renderActivity();}
function addCustomAct(){const inp=document.getElementById('customInp');const val=inp?.value?.trim();if(!val)return;selAct='custom';selActLabel=val;renderActivity();}
function confirmLog(){
  S.lastAction={type:'activity',date:todayKey()};
  S.activityLog[todayKey()]={type:selAct,label:selActLabel,duration:selDur,intensity:selInt};
  if(raMode==='replace'){S.adaptedToday=getAdapted(selAct,selDur,selInt,selActLabel);}
  if(raMode==='add'){S.dayMode[todayKey()]='both';S.homeWorkout=pickAtHome();}
  save();renderActivity();renderHome();
}

function renderWeights(){
  let h=`<div class="page-header"><div class="page-title">Weights</div><div class="page-sub">${S.totalWeeks<2?'Baseline phase — log what you lift. Targets start week 3.':'Progressive overload active.'}</div></div>`;
  ['upper','lower'].forEach(cat=>{
    h+=`<div class="slbl">${cat==='upper'?'Upper body':'Lower body'}</div>`;
    Object.entries(LIFTS).filter(([,l])=>l.cat===cat).forEach(([name,lift])=>{
      const w=S.weights[name];const sugg=getSuggested(name);
      const tc=sugg?.phase==='progress'?'tr-up':sugg?.phase==='deload'||sugg?.phase==='reduced'?'tr-down':sugg?.phase==='baseline'?'tr-base':'tr-hold';
      h+=`<div class="wt-card"><div class="wt-cr"><div><div class="wt-cn">${name}</div><div class="wt-cm">${lift.reps} reps${lift.note?' · '+lift.note:''}</div></div>${sugg?`<span class="wt-trend ${tc}">${sugg.label}</span>`:''}</div><div class="wt-nums"><div class="wt-num"><div class="wt-nv">${sugg?sugg.weight+'lb':'—'}</div><div class="wt-nl">suggested</div></div><div class="wt-num"><div class="wt-nv">${w?w.current+'lb':'—'}</div><div class="wt-nl">last logged</div></div><div class="wt-num"><div class="wt-nv">${w?.sessions||0}</div><div class="wt-nl">sessions</div></div></div></div>`;
    });
  });
  h+=`<div class="slbl">Shoulder status</div><button class="shoulder-btn${S.shoulderFlagged?' flagged':''}" onclick="toggleShoulder()"><i class="ti ti-${S.shoulderFlagged?'alert-triangle':'check'}"></i>${S.shoulderFlagged?'Shoulder flagged — pressing weights reduced 15%':'Shoulder feeling fine — tap to flag'}</button><div style="height:16px"></div>`;
  document.getElementById('weightsScreen').innerHTML=h;
}

function renderWeek(){
  const vol=[{l:'Strength',d:0,t:3,c:'var(--blue)'},{l:'LeoMoves',d:0,t:2,c:'var(--purple)'},{l:'Sport',d:0,t:2,c:'var(--green)'},{l:'Rest',d:0,t:1,c:'var(--amber)'}];
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-DOW+i);
    const key=gk(d);const p=PROG[i];
    if(S.completedDays[key]){if(p.badge==='b-lift'||p.badge==='b-combo')vol[0].d++;if(p.badge==='b-leo'||p.badge==='b-combo')vol[1].d++;if(p.badge==='b-surf')vol[2].d++;if(p.isRest)vol[3].d++;}
    if(S.activityLog[key])vol[2].d=Math.min(vol[2].d+1,vol[2].t);
  }
  let h=`<div class="page-header"><div class="page-title">This week</div></div><div class="vol-grid">`;
  vol.forEach(v=>{const pct=Math.round(Math.min(v.d/v.t,1)*100);h+=`<div class="vol-card"><div class="vol-lbl">${v.l}</div><div class="vol-val">${v.d} / ${v.t}</div><div class="vol-bg"><div class="vol-bar" style="width:${pct}%;background:${v.c}"></div></div></div>`;});
  h+=`</div><div class="slbl">All 7 days</div>`;
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-DOW+i);
    const key=gk(d);const p=PROG[i];const isToday=i===DOW;
    const done=S.completedDays[key];const act=S.activityLog[key];
    h+=`<div class="wdi${isToday?' today-wdi':''}"><div><div class="wdi-n">${DAYS[i]}${isToday?' <span style="font-size:10px;color:var(--blue);font-weight:400">(today)</span>':''}</div><div class="wdi-s">${p.name}</div></div><div style="display:flex;gap:6px;align-items:center">${act?`<span class="badge b-surf" style="font-size:9px">${act.label}</span>`:''}${done?'<i class="ti ti-check" style="font-size:16px;color:var(--green)"></i>':'<span style="font-size:11px;color:var(--text3)">—</span>'}</div></div>`;
  }
  h+=`<div style="padding:12px 16px"><button onclick="showShareCard()" style="width:100%;padding:13px;font-size:13px;font-weight:600;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-share" style="font-size:14px"></i>Share week summary</button></div><div style="height:16px"></div>`;
  document.getElementById('weekScreen').innerHTML=h;
}

function renderProgress(){
  const total=Object.keys(S.completedDays).length+Object.keys(S.activityLog).length;
  const cons=S.streak>0?Math.min(Math.round(S.streak/Math.max(S.totalWeeks*7,7)*100),100):0;
  const avgS=S.weekHistory.length?Math.round(S.weekHistory.reduce((a,w)=>a+(w.strengthDone||0),0)/S.weekHistory.length*10)/10:0;
  let h=`<div class="page-header"><div class="page-title">Progress</div><div class="page-sub">AI review of your training</div></div>
  <div class="prog-stats">
    <div class="prog-stat"><div class="prog-lbl">Sessions logged</div><div class="prog-val">${total}</div><div class="prog-bg"><div class="prog-bar" style="width:${Math.min(total/20*100,100)}%;background:var(--green)"></div></div></div>
    <div class="prog-stat"><div class="prog-lbl">Streak</div><div class="prog-val">${S.streak}d</div><div class="prog-bg"><div class="prog-bar" style="width:${Math.min(S.streak/30*100,100)}%;background:var(--blue)"></div></div></div>
    <div class="prog-stat"><div class="prog-lbl">Avg strength/wk</div><div class="prog-val">${avgS}/3</div><div class="prog-bg"><div class="prog-bar" style="width:${Math.min(avgS/3*100,100)}%;background:var(--purple)"></div></div></div>
    <div class="prog-stat"><div class="prog-lbl">Consistency</div><div class="prog-val">${cons}%</div><div class="prog-bg"><div class="prog-bar" style="width:${cons}%;background:var(--amber)"></div></div></div>
  </div>
  <div class="slbl">How are you feeling?</div>
  <textarea class="notes-inp" id="progNotes" rows="3" placeholder="Energy, shoulder, recent lifts, what's working…"></textarea>
  <div class="slbl">Progress photo (optional)</div>
  <div class="photo-upload" onclick="document.getElementById('progPhotoInput').click()">
    <i class="ti ti-camera" style="font-size:24px;color:var(--text3)"></i>
    <div style="font-size:13px;color:var(--text2);margin-top:6px" id="progPhotoLabel">Tap to attach a photo to this check-in</div>
    <div style="font-size:11px;color:var(--text3);margin-top:2px">Or <span style="color:var(--purple);font-weight:500;cursor:pointer" onclick="event.stopPropagation();nav('photos')">view photo journal →</span></div>
  </div>
  <button class="check-btn" id="checkBtn" onclick="runCheck()"><i class="ti ti-telescope" style="font-size:14px"></i>Run progress check</button>
  <div id="progResult"></div><div style="height:16px"></div>`;
  document.getElementById('progressScreen').innerHTML=h;
}

function handleProgPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.uploadedPhoto=ev.target.result;save();const lbl=document.getElementById('progPhotoLabel');if(lbl)lbl.textContent='Photo ready — '+f.name;};r.readAsDataURL(f);}

async function runCheck(){
  const btn=document.getElementById('checkBtn');btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Analysing…`;
  const notes=document.getElementById('progNotes')?.value?.trim()||'';
  const liftSummary=Object.entries(S.weights).map(([n,w])=>`${n}: ${w.current}lb (${w.sessions} sessions, ${w.hitLast?'hitting reps':'missing reps'})`).join('; ');
  const ctx=`Athlete: 41yo male, lean athletic build, strong cardio base (surfing, cycling, hiking, skiing, wingfoiling). Goal: LeoMoves physique — lean, functional, athletic muscle. NOT bulky. Priority: look great, feel great, fun training, no injury. Injuries: supraspinatus (right shoulder), Achilles history.\nStreak: ${S.streak} days. Weeks: ${S.totalWeeks}. Sessions: ${Object.keys(S.completedDays).length}.\nLifts: ${liftSummary||'none yet — baseline phase'}.\nNotes: ${notes||'none'}.`;
  const msgs=[{role:'user',content:S.uploadedPhoto?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:S.uploadedPhoto.split(',')[1]}},{type:'text',text:ctx+'\n\nHonest progress check: (1) what\'s on track, (2) what needs attention, (3) one specific tweak, (4) 4-week target. Direct, personal, max 180 words, no bullets.'}]:[{type:'text',text:ctx+'\n\nHonest progress check: (1) what\'s on track, (2) what needs attention, (3) one specific tweak, (4) 4-week target. Direct, personal, max 180 words, no bullets.'}]}];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:msgs})});
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    document.getElementById('progResult').innerHTML=`<div class="ai-result">${text.split('\n').filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join('')}</div>`;
  }catch(e){document.getElementById('progResult').innerHTML=`<div class="ai-result"><p>Couldn't connect. Try again in a moment.</p></div>`;}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh" style="font-size:14px"></i>Run again';
}

function compressPhoto(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.75));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handleNewPhoto(e){
  const file=e.target.files[0];if(!file)return;
  compressPhoto(file,dataUrl=>{
    if(!S.photos)S.photos=[];
    const note=prompt('Label this photo (e.g. "Week 1 front"):','')||'';
    S.photos.unshift({id:Date.now(),date:new Date().toISOString(),dataUrl,note});
    try{save();}catch(err){alert('Storage full — delete older photos first.');S.photos.shift();return;}
    S.photoLastTaken=new Date().toISOString();save();renderPhotos();renderHome();
  });
  e.target.value='';
}

function deletePhoto(id){if(!confirm('Delete this photo?'))return;S.photos=(S.photos||[]).filter(p=>p.id!==id);save();renderPhotos();}
function openLB(id){const p=(S.photos||[]).find(p=>p.id===id);if(!p)return;document.getElementById('lbImg').src=p.dataUrl;document.getElementById('lbDate').textContent=new Date(p.date).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('lbNote').textContent=p.note||'';document.getElementById('lightbox').classList.add('open');}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}

function renderPhotos(){
  const photos=S.photos||[];
  const usedKB=Math.round(JSON.stringify(S).length*2/1024);
  const maxKB=4500;const pct=Math.min(Math.round(usedKB/maxKB*100),100);
  let h=`<div class="page-header"><div class="page-title">Progress photos</div><div class="page-sub">Visual record of your journey</div></div>`;
  h+=`<button class="photo-add" onclick="document.getElementById('photoCapture').click()"><i class="ti ti-camera" style="font-size:18px"></i>Add progress photo</button>`;
  h+=`<div class="photo-storage"><div class="stor-bg"><div class="stor-fill" style="width:${pct}%"></div></div><div class="stor-lbl">Storage: ~${usedKB}KB / ${maxKB}KB${pct>80?' · Getting full — delete older photos':''}</div></div>`;
  if(photos.length===0){
    h+=`<div class="photo-empty"><i class="ti ti-camera"></i><div class="photo-empty-title">No photos yet</div><div class="photo-empty-sub">Add your first progress photo above. Front and side shots in the same spot each week give the best comparison.</div></div>`;
  } else {
    h+=`<div class="photo-grid">`;
    photos.forEach(p=>{
      const d=new Date(p.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      h+=`<div class="photo-entry"><img src="${p.dataUrl}" alt="progress" onclick="openLB(${p.id})"/><div class="photo-meta">${p.note||'Progress photo'}<div class="photo-date">${d}</div></div><button class="photo-del" onclick="deletePhoto(${p.id})"><i class="ti ti-trash" style="font-size:11px"></i></button></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div style="height:16px"></div>`;
  document.getElementById('photosScreen').innerHTML=h;
}

function showPlanPrompt(){
  const next=PROG[(DOW+1)%7];
  document.getElementById('planSub').textContent=`When are you planning ${next.isRest?'your next':'tomorrow\'s'} ${next.name.toLowerCase()}?`;
  const times=['6am','7am','8am','9am','10am','12pm','5pm','6pm','7pm','8pm'];
  document.getElementById('timeChips').innerHTML=times.map(t=>`<span class="time-chip${S.selectedPlanTime===t?' sel':''}" onclick="selPlan('${t}')">${t}</span>`).join('');
  document.getElementById('planOverlay').classList.add('open');
}
function selPlan(t){S.selectedPlanTime=t;save();document.querySelectorAll('.time-chip').forEach(c=>c.classList.toggle('sel',c.textContent===t));}
function confirmPlan(){if(S.selectedPlanTime){S.planTime=S.selectedPlanTime;save();}document.getElementById('planOverlay').classList.remove('open');}

function showShareCard(){
  const total=Object.keys(S.completedDays).length+Object.keys(S.activityLog).length;
  let bestLift='—';let bestVal=0;
  Object.entries(S.weights).forEach(([n,w])=>{if(w.current>bestVal){bestVal=w.current;bestLift=n.split(' ').slice(-1)[0]+' '+w.current+'lb';}});
  const week=today.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('shareCard').innerHTML=`
    <div class="share-hdr"><div class="share-title">Weekly summary</div><div class="share-date">w/e ${week}</div></div>
    <div class="share-streak"><div class="share-sv">${S.streak}</div><div class="share-sl">day streak</div></div>
    <div class="share-stats">
      <div class="ss"><div class="ss-val">${total}</div><div class="ss-lbl">Sessions</div></div>
      <div class="ss"><div class="ss-val">${S.shields}🛡️</div><div class="ss-lbl">Shields</div></div>
      <div class="ss"><div class="ss-val">${S.totalWeeks}</div><div class="ss-lbl">Weeks</div></div>
    </div>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px">Top lift: ${bestLift}</div>
    <div class="share-btns">
      <button class="share-btn share-copy" onclick="copyShare()">Copy to share</button>
      <button class="share-btn share-close" onclick="closeShare()">Close</button>
    </div>`;
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShare(){document.getElementById('shareOverlay').classList.remove('open');}
function copyShare(){
  const total=Object.keys(S.completedDays).length+Object.keys(S.activityLog).length;
  const text=`${S.streak} day training streak 🔥\n${total} sessions · ${S.totalWeeks} weeks in\nBuilding the LeoMoves physique — athletic, lean, functional.`;
  navigator.clipboard?.writeText(text).catch(()=>{});
  const btn=document.querySelector('.share-copy');if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy to share',2000);}
}

if(!S.photos)S.photos=[];
setupShake();
renderHome();
</script>
