<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Train"/>
<meta name="theme-color" content="#f5f4f1"/>
<title>Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
:root{
  --bg:#f5f4f1;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e6df;
  --text:#1a1917;--text2:#6b6760;--text3:#a09c96;
  --green:#1D9E75;--green2:#0F6E56;--gbg:#EAF3DE;--gtxt:#27500A;
  --purple:#534AB7;--purple2:#3C3489;--pbg:#EEEDFE;
  --blue:#185FA5;--blue2:#0C447C;--bbg:#E6F1FB;
  --red:#A32D2D;--red2:#E24B4A;--rbg:#FCEBEB;
  --amber:#854F0B;--amber2:#633806;--abg:#FAEEDA;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --r:12px;--rsm:8px;--rlg:18px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
input,button,textarea,select{font-family:var(--font);font-size:15px}
button{cursor:pointer;border:none;background:none;color:inherit}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px;display:none;-webkit-overflow-scrolling:touch}
.screen.active{display:block}
.screen::-webkit-scrollbar,.screen{-ms-overflow-style:none;scrollbar-width:none}
#nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;font-size:10px;color:var(--text3);border:none;background:none}
.ni i{font-size:22px}
.ni.active{color:var(--green)}
.ni.np.active{color:var(--purple)}
.ni.nx.active{color:var(--amber)}
.ph{padding:52px 16px 14px}
.pt{font-size:26px;font-weight:600;letter-spacing:-0.5px}
.ps{font-size:13px;color:var(--text2);margin-top:2px}
.slbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:0 16px;margin:12px 0 7px}
/* STREAK */
.sr{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:10px}
.sc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.sv{font-size:32px;font-weight:600;color:var(--green);line-height:1;font-family:var(--mono)}
.ss{font-size:11px;color:var(--text3);margin-top:3px}
.shields{display:flex;gap:3px;margin-top:6px}
.shield{font-size:13px;opacity:0.2}
.shield.on{opacity:1}
/* WEEK DOTS */
.wd{display:flex;gap:5px;padding:0 16px;margin-bottom:12px;justify-content:space-between}
.dw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:0.5px solid var(--border2);color:var(--text3);background:var(--bg2);transition:all 0.2s;cursor:pointer}
.dot.done{background:var(--green2);border-color:var(--green2);color:#fff}
.dot.today{border:2px solid var(--blue);color:var(--blue)}
.dot.today.done{background:var(--green2);border:2px solid var(--green);color:#fff}
.dot.act{background:var(--blue);border-color:var(--blue);color:#fff}
.dot.both{background:var(--green2);border:2px solid var(--blue);color:#fff}
.dot.rd{background:var(--bg3)}
.dl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em}
/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.02em}
.bl{background:var(--bbg);color:var(--blue2)}
.bleo{background:var(--pbg);color:var(--purple2)}
.bco{background:var(--abg);color:var(--amber2)}
.bs{background:#E1F5EE;color:#085041}
.br{background:var(--bg3);color:var(--text3)}
.bad{background:var(--gbg);color:var(--gtxt)}
/* WORKOUT CARD */
.wkc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);margin:0 16px 10px;overflow:hidden}
.wkh{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.wkt{font-size:17px;font-weight:600}
.wks{font-size:12px;color:var(--text2);margin-top:2px}
.wksl{padding:6px 16px 3px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;border-top:0.5px solid var(--border)}
.exl{border-top:0.5px solid var(--border)}
.exi{padding:10px 16px;border-bottom:0.5px solid var(--border)}
.exi:last-child{border-bottom:none}
.ext{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.exn{font-size:13px;font-weight:500}
.exno{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.exr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.exs{font-size:12px;color:var(--text2);font-family:var(--mono)}
.db{font-size:10px;padding:3px 7px;border-radius:6px;border:0.5px solid var(--border2);color:var(--text3)}
/* EXPLANATIONS */
.expl{margin-top:6px;background:var(--bbg);border-radius:var(--rsm);padding:7px 10px;font-size:11px;color:var(--blue2);line-height:1.5;border-left:2px solid var(--blue)}
/* WEIGHT BLOCK */
.wtb{margin-top:7px;background:var(--bg3);border-radius:var(--rsm);padding:8px 10px}
.wtsr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.wtl{font-size:10px;color:var(--text3)}
.wtv{font-size:13px;font-weight:500;color:var(--text2);font-family:var(--mono)}
.wtt{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px}
.tup{background:var(--gbg);color:var(--gtxt)}
.thold{background:var(--abg);color:var(--amber2)}
.tdown{background:var(--rbg);color:var(--red)}
.tbase{background:var(--bg4);color:var(--text3);border:0.5px solid var(--border2)}
.wtir{display:flex;align-items:center;gap:7px}
.wti{width:58px;padding:6px 8px;font-size:13px;font-weight:500;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono)}
.wti:focus{outline:none;border-color:var(--green)}
/* REPS BLOCK (for max-rep exercises) */
.rpb{margin-top:7px;background:var(--gbg);border-radius:var(--rsm);padding:8px 10px;border:0.5px solid #9FE1CB}
.rpl{font-size:10px;color:var(--gtxt);margin-bottom:5px}
.rpi{width:58px;padding:6px 8px;font-size:13px;font-weight:500;border-radius:var(--rsm);border:0.5px solid #9FE1CB;background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono)}
.rpi:focus{outline:none;border-color:var(--green)}
.wiu{font-size:11px;color:var(--text3)}
.rl{font-size:10px;color:var(--text3);flex:1;text-align:right}
.ib{width:34px;height:34px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.iby{background:var(--green2);color:#fff}
.ibn{background:var(--red2);color:#fff}
.wlog{display:flex;align-items:center;gap:7px;font-size:12px;border-radius:var(--rsm);padding:6px 10px;margin-top:6px}
.lhit{background:var(--gbg);color:var(--gtxt)}
.lmis{background:var(--rbg);color:var(--red)}
/* SKILL BLOCK */
.skb{margin-top:7px;background:var(--pbg);border-radius:var(--rsm);padding:8px 10px;border:0.5px solid #AFA9EC}
.skl{font-size:10px;color:var(--purple);font-weight:600;margin-bottom:4px}
.skr{display:flex;justify-content:space-between}
.skn{font-size:11px;color:var(--purple2)}
.skt{font-size:10px;color:var(--purple)}
.skbb{height:3px;background:#AFA9EC;border-radius:2px;margin-top:5px}
.skbr{height:3px;background:var(--purple);border-radius:2px}
/* DEMO */
.da{display:none;padding:8px 0 2px}
.da.open{display:block}
.dimg{width:100%;max-width:280px;border-radius:var(--rsm);background:var(--bg3);display:block;margin:0 auto}
.dcap{font-size:10px;color:var(--text3);text-align:center;margin-top:4px}
/* TIPS */
.tipb{background:var(--bbg);border-top:0.5px solid #B5D4F4;padding:9px 16px;font-size:12px;color:var(--blue2);line-height:1.5}
.adbb{background:var(--gbg);border:0.5px solid #9FE1CB;border-radius:var(--rsm);padding:9px 12px;font-size:12px;color:#085041;margin:0 16px 10px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.bln{background:var(--abg);border-top:0.5px solid #FAC775;padding:9px 16px;font-size:11px;color:var(--amber2);line-height:1.5}
/* CTA */
.cta{width:calc(100% - 32px);margin:8px 16px 0;padding:14px;font-size:14px;font-weight:600;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:7px;border:none}
.ctag{background:var(--green2);color:#fff}
.ctap{background:var(--purple2);color:#fff}
.ctax{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
/* LEO HERO */
.lh{background:var(--pbg);border:0.5px solid #AFA9EC;border-radius:var(--rlg);margin:0 16px 12px;padding:16px;display:flex;gap:14px;align-items:flex-start}
.lhi{width:42px;height:42px;border-radius:50%;background:var(--purple2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lhi i{font-size:20px;color:#fff}
.lht{font-size:14px;font-weight:600}
.lhs{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}
.lhb{margin-top:9px;font-size:11px;font-weight:600;padding:7px 14px;border-radius:20px;background:var(--purple2);color:#fff;display:inline-flex;align-items:center;gap:5px;border:none}
/* PHOTO NUDGE */
.phn{background:var(--pbg);border:0.5px solid #AFA9EC;border-radius:var(--r);margin:0 16px 10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.phni{font-size:22px;color:var(--purple);flex-shrink:0;margin-top:1px}
.phnt{font-size:13px;font-weight:600;color:var(--purple2)}
.phns{font-size:11px;color:var(--purple);margin-top:2px;line-height:1.4}
.phnb{margin-top:8px;font-size:11px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--purple2);color:#fff;display:inline-flex;align-items:center;gap:4px;border:none}
/* ACTIVITY LOG INLINE */
.act-inline{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);margin:0 16px 10px;overflow:hidden}
.act-inline-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid var(--border)}
.act-inline-title{font-size:13px;font-weight:600;color:var(--text)}
.act-grid-sm{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px}
.agb{padding:8px 4px;font-size:11px;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s}
.agb i{font-size:16px}
.agb.sel{background:var(--bbg);border-color:var(--blue);color:var(--blue2)}
.act-dur{display:flex;gap:6px;padding:0 12px 8px;flex-wrap:wrap}
.act-int{display:flex;gap:6px;padding:0 12px 8px;flex-wrap:wrap}
.dc{font-size:11px;padding:5px 10px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer}
.dc.sel{background:var(--gbg);border-color:var(--green);color:var(--gtxt)}
.act-log-btn{width:calc(100% - 24px);margin:0 12px 12px;padding:11px;font-size:13px;font-weight:600;border-radius:var(--rsm);background:var(--green2);color:#fff;border:none}
.act-log-btn:disabled{opacity:0.3}
/* WORKOUT MODE */
#wm{position:absolute;inset:0;background:var(--bg2);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#wm.open{display:flex}
.wmp{display:flex;gap:4px;margin-bottom:24px;width:100%;max-width:320px}
.wmpi{height:3px;border-radius:2px;flex:1;background:var(--bg3)}
.wmpi.done{background:var(--green)}
.wmpi.cur{background:var(--green);opacity:0.4}
.wme{font-size:24px;font-weight:600;text-align:center;line-height:1.2;margin-bottom:5px;letter-spacing:-0.3px;max-width:300px}
.wmn{font-size:12px;color:var(--text2);text-align:center;margin-bottom:4px;line-height:1.4;max-width:280px}
.wmst{font-size:17px;font-weight:500;color:var(--green);text-align:center;font-family:var(--mono);margin-bottom:8px}
.wmex{background:var(--bbg);border-radius:var(--rsm);padding:10px 14px;font-size:12px;color:var(--blue2);line-height:1.5;margin-bottom:12px;max-width:320px;width:100%;border-left:2px solid var(--blue);display:none}
.wmwt{background:var(--bg3);border-radius:var(--r);padding:12px 16px;margin-bottom:10px;width:100%;max-width:320px;display:none}
.wmsg{font-size:11px;color:var(--text3);margin-bottom:5px}
.wmir{display:flex;align-items:center;gap:8px;justify-content:center}
.wmin{width:76px;padding:9px;font-size:18px;font-weight:600;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);text-align:center;font-family:var(--mono)}
.wmin:focus{outline:none;border-color:var(--green)}
.wmu{font-size:13px;color:var(--text3)}
.wmrp{background:var(--gbg);border-radius:var(--r);padding:12px 16px;margin-bottom:10px;width:100%;max-width:320px;display:none;border:0.5px solid #9FE1CB}
.wmrpl{font-size:11px;color:var(--gtxt);margin-bottom:5px}
/* REST TIMER */
.wmt{width:100%;max-width:320px;background:var(--bg3);border-radius:var(--r);padding:12px 16px;margin-bottom:10px}
.wmtt{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.wmtv{font-size:28px;font-weight:600;font-family:var(--mono)}
.wmtbs{display:flex;gap:6px}
.wmtb{padding:6px 12px;font-size:11px;font-weight:600;border-radius:20px;border:none}
.wmts{background:var(--green2);color:#fff}
.wmtr{background:var(--bg4);color:var(--text2)}
.wmtbg{height:4px;background:var(--bg4);border-radius:2px}
.wmtbr{height:4px;border-radius:2px;transition:width 1s linear}
/* WM DEMO */
.wmda{width:100%;max-width:320px;margin-bottom:10px;display:none}
.wmda.open{display:block}
.wmda img{width:100%;border-radius:var(--rsm);max-height:180px;object-fit:contain;background:var(--bg3)}
.wmddb{font-size:11px;font-weight:500;padding:6px 12px;border-radius:var(--rsm);border:0.5px solid var(--border2);color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px;width:100%;max-width:320px;justify-content:center}
.wmrl{font-size:12px;color:var(--text3);text-align:center;margin-bottom:6px}
.wmbs{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:6px}
.wmb{flex:1;padding:15px;border-radius:var(--r);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;border:none}
.wmby{background:var(--green2);color:#fff}
.wmbn{background:var(--red2);color:#fff}
.wmsk{font-size:12px;color:var(--text3);padding:8px;border-radius:var(--rsm)}
.wmc{font-size:11px;color:var(--text3);margin-top:4px}
.wmcl{position:absolute;top:52px;right:16px;font-size:12px;color:var(--text3);padding:8px 12px;border-radius:var(--rsm);background:var(--bg3);border:none}
/* ACTIVITY FULL SCREEN */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.abi{padding:11px 8px;font-size:12px;font-weight:500;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.15s}
.abi i{font-size:19px}
.abi.sel{background:var(--bbg);border-color:var(--blue);color:var(--blue2)}
.cr{display:flex;gap:8px;padding:0 16px;margin-bottom:10px}
.ci{flex:1;padding:9px 12px;font-size:13px;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)}
.ci:focus{outline:none;border-color:var(--green)}
.ci::placeholder{color:var(--text3)}
.ab{padding:9px 14px;font-size:12px;font-weight:600;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2)}
.dcs{display:flex;gap:6px;padding:0 16px;margin-bottom:8px;flex-wrap:wrap}
.lac{background:var(--gbg);border:0.5px solid #9FE1CB;border-radius:var(--r);padding:12px 14px;margin:0 16px 10px}
/* DAY DETAIL OVERLAY */
.ddo{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:90;display:none;align-items:flex-end;justify-content:center}
.ddo.open{display:flex}
.dds{background:var(--bg2);border-radius:var(--rlg) var(--rlg) 0 0;padding:20px 20px 40px;width:100%;max-width:430px;border-top:0.5px solid var(--border);max-height:80vh;overflow-y:auto}
.ddt{font-size:18px;font-weight:600;margin-bottom:4px}
.ddd{font-size:12px;color:var(--text2);margin-bottom:14px}
.ddc{font-size:14px;font-weight:600;color:var(--text);margin:10px 0 6px}
.dde{background:var(--bg3);border-radius:var(--rsm);padding:9px 12px;margin-bottom:6px;font-size:13px;color:var(--text2)}
.ddok{width:100%;padding:13px;font-size:14px;font-weight:600;border-radius:var(--r);background:var(--green2);color:#fff;border:none;margin-top:8px}
/* WEIGHTS SCREEN */
.wtc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin:0 16px 8px}
.wtcr{display:flex;justify-content:space-between;align-items:flex-start}
.wtcn{font-size:13px;font-weight:500}
.wtcm{font-size:10px;color:var(--text3);margin-top:2px}
.wtns{display:flex;gap:14px;margin-top:8px}
.wtn{text-align:center}
.wtnv{font-size:14px;font-weight:600;font-family:var(--mono)}
.wtnl{font-size:9px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.04em}
.shb{width:calc(100% - 32px);margin:4px 16px;padding:11px;font-size:12px;font-weight:500;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px}
.shb.fl{background:var(--rbg);border-color:#F09595;color:var(--red)}
/* WEEK SCREEN */
.vg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:10px}
.vc{background:var(--bg2);border-radius:var(--rsm);padding:9px 12px;border:0.5px solid var(--border)}
.vcl{font-size:10px;color:var(--text3);margin-bottom:3px}
.vcv{font-size:14px;font-weight:600;font-family:var(--mono);margin-bottom:4px}
.vbg{height:3px;background:var(--bg4);border-radius:2px}
.vb{height:3px;border-radius:2px}
.wdi{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 14px;margin:0 16px 6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.wdi.tw{border-color:var(--blue)}
.wdin{font-size:13px;font-weight:500}
.wdis{font-size:11px;color:var(--text3);margin-top:1px}
/* PROGRESS SCREEN */

function ds(){return{streak:0,best:0,shields:0,totalWeeks:0,completedDays:{},activityLog:{},weights:{},skillProgress:{lsit:20,handstand:10},shoulderFlagged:false,photoLastTaken:null,uploadedPhoto:null,photos:[],weekHistory:[],lastAction:null,milestonesSeen:[],selectedPlanTime:null,leoWeek:0};}

// ── WEIGHT HELPERS ────────────────────────────────────────
function getSuggested(name){
  const lift=LIFTS[name];if(!lift)return null;
  const w=S.weights[name];
  if(!w||w.sessions<2)return{weight:lift.startLb,phase:'baseline',label:'Starting weight'};
  if(S.shoulderFlagged&&lift.shoulder)return{weight:Math.round(w.current*0.85/2.5)*2.5,phase:'reduced',label:'Shoulder deload'};
  if(w.missStreak>=2)return{weight:Math.round(w.current*0.9/2.5)*2.5,phase:'deload',label:'Deload −10%'};
  if(w.hitLast)return{weight:w.current+lift.inc,phase:'progress',label:`+${lift.inc}lb`};
  return{weight:w.current,phase:'hold',label:'Hold'};
}
function logWeight(name,weight,hit){
  S.lastAction={type:'weight',name,prev:S.weights[name]?{...S.weights[name]}:null};
  if(!S.weights[name])S.weights[name]={current:weight,sessions:0,missStreak:0,hitLast:false,history:[],type:'weight'};
  const w=S.weights[name];
  w.history.push({date:tk(),weight,hit});w.current=weight;w.sessions++;w.hitLast=hit;
  if(!hit)w.missStreak++;else w.missStreak=0;
  save();showUndo(`${name} ${weight}lb ${hit?'✓':'✗'}`);checkMilestones();
}
function logReps(name,reps){
  S.lastAction={type:'reps',name,prev:S.weights[name]?{...S.weights[name]}:null};
  if(!S.weights[name])S.weights[name]={current:0,sessions:0,missStreak:0,hitLast:true,history:[],type:'reps',bestReps:0};
  const w=S.weights[name];
  w.history.push({date:tk(),reps});w.sessions++;
  if(reps>w.bestReps)w.bestReps=reps;
  save();showUndo(`${name} ${reps} reps logged`);checkMilestones();
}

// ── SMART ADAPTATION ──────────────────────────────────────
function getWeekDone(){
  const done={upper:0,lower:0,leo:0,days:[]};
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-DOW+i);
    const key=gk(d);
    if(S.completedDays[key]){
      done.days.push(i);
      const p=PROG[i];
      if(p.isLeo)done.leo++;
      else if(!p.isRest&&!p.isFlex){
        if(p.sections.some(s=>s.ex.some(e=>e.n==='Barbell back squat')))done.lower++;
        else done.upper++;
      }
    }
  }
  return done;
}

function getSmartWorkout(){
  // Check if today already has a logged completion
  const todayProg=PROG[DOW];
  const act=S.activityLog[tk()];

  // Saturday flex day — suggest what's missing
  if(DOW===6&&todayProg.isFlex){
    const done=getWeekDone();
    if(done.lower===0)return{...PROG[3],swapReason:'You haven\'t done lower strength this week — good day to make it up.',swapped:true};
    if(done.upper<2)return{...PROG[1],swapReason:'Missing an upper session this week — make it up today.',swapped:true};
    if(done.leo<2)return{...PROG[2],swapReason:'Second LeoMoves session for the week.',swapped:true};
    return todayProg; // full week done, flex as planned
  }

  // Any other day — check if there's a critical missed session to flag
  const done=getWeekDone();
  const daysLeft=6-DOW; // days remaining in week after today
  if(done.lower===0&&daysLeft<=1&&!todayProg.sections?.some(s=>s.ex?.some(e=>e.n==='Barbell back squat'))){
    return{...PROG[3],swapReason:'You haven\'t done lower strength this week and it\'s running out of days — reshuffled to lower today.',swapped:true};
  }

  if(!act)return todayProg;
  return adaptToActivity(todayProg,act);
}

function adaptToActivity(prog,act){
  const hard=act.intensity==='Hard'||act.intensity==='Epic session';
  const long=act.duration==='1.5 hrs'||act.duration==='2+ hrs';
  const surf=act.type==='surf'||act.type==='wing'||act.type==='swim';
  const legs=act.type==='hike'||act.type==='ski'||act.type==='run'||act.type==='ride';
  // Only back off for genuine hard/long sessions
  if((hard&&long)||(act.intensity==='Epic session')){
    return{...prog,adaptNote:`Hard ${act.label} session — keeping workout but consider reducing weight by 10% today.`,adapted:true};}
  if(surf&&!hard){
    return{...prog,adaptNote:`${act.label} paddling loaded your shoulders — face pulls and rows will feel it. Adjust weight if needed.`,adapted:true};}
  if(legs&&hard){
    return{...prog,adaptNote:`Hard ${act.label} hit your legs — hip thrust and squat load may need reducing today.`,adapted:true};}
  return{...prog,adaptNote:null,adapted:false};
}

// ── SHAKE TO UNDO ─────────────────────────────────────────
let lastShake=0;
function setupShake(){
  if(!window.DeviceMotionEvent)return;
  function handle(e){const a=e.accelerationIncludingGravity;if(!a)return;const mag=Math.sqrt(a.x**2+a.y**2+a.z**2);const now=Date.now();if(mag>25&&now-lastShake>1200){lastShake=now;undoLast();}}
  const req=DeviceMotionEvent.requestPermission;
  if(typeof req==='function'){document.addEventListener('click',()=>{req().then(r=>{if(r==='granted')window.addEventListener('devicemotion',handle);}).catch(()=>{});},{once:true});}
  else window.addEventListener('devicemotion',handle);
}
function undoLast(){
  if(!S.lastAction)return;
  const a=S.lastAction;
  if(a.type==='complete'){delete S.completedDays[a.date];S.streak=Math.max(0,S.streak-1);S.lastAction=null;save();showUndo('Day completion undone');renderHome();}
  else if(a.type==='weight'){if(a.prev)S.weights[a.name]={...a.prev};else delete S.weights[a.name];S.lastAction=null;save();showUndo(`${a.name} weight undone`);renderHome();}
  else if(a.type==='activity'){delete S.activityLog[a.date];S.lastAction=null;save();showUndo('Activity undone');renderHome();renderActivity();}
}
function showUndo(msg){document.getElementById('uText').textContent=msg;const t=document.getElementById('uToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function hideUndo(){document.getElementById('uToast').classList.remove('show');}

  const map={home:'homeScreen',activity:'activityScreen',weights:'weightsScreen',week:'weekScreen',progress:'progressScreen',photos:'photosScreen'};

}

  if(loggedToday){
    if(isReps){h+=`<div class="wlog lhit"><i class="ti ti-check" style="font-size:13px"></i>${loggedToday.reps} reps logged</div>`;}
    else{h+=`<div class="wlog ${loggedToday.hit?'lhit':'lmis'}"><i class="ti ti-${loggedToday.hit?'check':'x'}" style="font-size:13px"></i>${loggedToday.weight}lb — ${loggedToday.hit?'reps hit ↗':'missed reps'}</div>`;}
  } else if(isReps){
    const best=S.weights[e.n]?.bestReps||0;
    h+=`<div class="rpb"><div class="rpl">Reps today${best?' (best: '+best+')':''}</div><div style="display:flex;align-items:center;gap:8px"><input type="number" class="rpi" id="ri-${rowId}" placeholder="reps" min="0" max="50" inputmode="numeric"/><span class="wiu">reps</span><button class="ib iby" onclick="logR('${e.n}','${rowId}')"><i class="ti ti-check"></i></button></div></div>`;

    h+=`</div>`;

  return h;

function logWt(name,rowId,hit){

function logR(name,rowId){

  const el=document.getElementById(rowId);

  if(rb)rb.innerHTML=`<div class="wlog lhit"><i class="ti ti-check" style="font-size:13px"></i>${reps} reps logged</div>`;
}
function logPU(name,rowId,hit){
  const wi=document.getElementById('wi-'+rowId);const ri=document.getElementById('ri-'+rowId);
  const added=parseFloat(wi?.value||0);const reps=parseInt(ri?.value||0);
  if(!S.weights[name])S.weights[name]={current:added,sessions:0,missStreak:0,hitLast:true,history:[],type:'weighted_pullup',bestReps:0,addedWeight:added};

function markComplete(){
  S.lastAction={type:'complete',date:tk(),prevStreak:S.streak};
  S.completedDays[tk()]=true;S.streak++;if(S.streak>S.best)S.best=S.streak;
  if(S.streak%7===0){S.totalWeeks++;S.shields=Math.min(S.shields+1,4);S.leoWeek=(S.leoWeek||0)+1;}

// ── DAY DETAIL OVERLAY ────────────────────────────────────
let dayDetailWorkout=null;

function showDayDetail(dayIndex){
  const d=new Date(today);d.setDate(today.getDate()-DOW+dayIndex);
  const key=gk(d);const p=PROG[dayIndex];const isToday=dayIndex===DOW;
  const done=S.completedDays[key];const act=S.activityLog[key];
  const isPast=dayIndex<DOW;const isFuture=dayIndex>DOW;
  const dateStr=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  dayDetailWorkout=p;

  let h=`<div class="ddt">${DAYS[dayIndex]} — ${p.name}</div><div class="ddd">${dateStr}${isToday?' · Today':done?' · Completed':isPast?' · Missed':''}`;
  if(act)h+=` · <span class="badge bs" style="font-size:9px">${act.label}</span>`;
  h+=`</div>`;

  p.sections.forEach(sec=>{
    h+=`<div class="ddc">${sec.label}</div>`;
    sec.ex.forEach(e=>{
      const logged=LIFTS[e.n]&&S.weights[e.n]?.history?.find(h=>h.date===key);
      h+=`<div class="dde">${e.n} <span style="color:var(--text3);font-size:11px">${e.s}</span>${logged?`<span style="float:right;color:var(--green);font-size:11px;font-weight:600">${logged.weight||logged.reps}${logged.weight?'lb':'reps'} ${logged.hit?'✓':''}</span>`:''}</div>`;
    });
  });

  // Show "Do this workout today" for past missed days or any non-rest day
  if(!p.isRest&&!isToday){
    h+=`<button class="ddok" style="background:var(--green2);margin-bottom:8px" onclick="doThisWorkoutToday()"><i class="ti ti-player-play" style="font-size:13px;margin-right:6px;vertical-align:-1px"></i>Do this workout today</button>`;
  }
  h+=`<button class="ddok" style="background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)" onclick="closeDayDetail()">Close</button>`;

  document.getElementById('dayDetailContent').innerHTML=h;
  document.getElementById('dayDetail').classList.add('open');
}

function doThisWorkoutToday(){
  closeDayDetail();
  if(!dayDetailWorkout)return;
  // Launch workout mode with the selected day's exercises
  wmList=[];
  dayDetailWorkout.sections.forEach(sec=>sec.ex.forEach(e=>{if(!e.isLeoMain)wmList.push(e);}));
  wmIdx=0;timerRunning=false;timerRemaining=0;clearInterval(timerInterval);
  document.getElementById('wm').classList.add('open');
  renderWMEx();
}
function closeDayDetail(){document.getElementById('dayDetail').classList.remove('open');}

// ── WORKOUT MODE ──────────────────────────────────────────
let wmList=[],wmIdx=0,timerInterval=null,timerRemaining=0,timerTotal=0,timerRunning=false;

function startWM(){
  const p=getSmartWorkout();
  wmList=[];p.sections.forEach(sec=>sec.ex.forEach(e=>{if(!e.isLeoMain)wmList.push(e);}));
  wmIdx=0;timerRunning=false;timerRemaining=0;clearInterval(timerInterval);
  document.getElementById('wm').classList.add('open');
  renderWMEx();
}
function closeWM(){document.getElementById('wm').classList.remove('open');clearInterval(timerInterval);}

function renderWMEx(){
  if(wmIdx>=wmList.length){closeWM();markComplete();return;}
  const e=wmList[wmIdx];
  document.getElementById('wmPips').innerHTML=Array.from({length:wmList.length},(_,i)=>`<div class="wmpi${i<wmIdx?' done':i===wmIdx?' cur':''}"></div>`).join('');
  document.getElementById('wmEx').textContent=e.n;
  document.getElementById('wmNote').textContent=e.note||'';
  document.getElementById('wmSets').textContent=e.s;
  document.getElementById('wmCounter').textContent=`${wmIdx+1} of ${wmList.length}`;

  const expl=EXPLANATIONS[e.n];
  const explEl=document.getElementById('wmExpl');
  if(expl){explEl.innerHTML=`<i class="ti ti-info-circle" style="font-size:11px;margin-right:4px;vertical-align:-1px"></i>${expl}`;explEl.style.display='block';}else{explEl.style.display='none';}

  // Demo button
  const demoUrl=DEMOS[e.n];
  const demoBtn=document.getElementById('wmDemoBtn');
  const demoArea=document.getElementById('wmDemo');

  if(demoUrl){demoBtn.style.display='flex';demoImg.src=demoUrl;demoArea.classList.remove('open');}
  else{demoBtn.style.display='none';}

  const lift=LIFTS[e.n];
  const sugg=!e.nw&&lift&&lift.trackType==='weight'?getSuggested(e.n):null;
  const isReps=!e.nw&&lift&&lift.trackType==='reps';
  const isPullup=!e.nw&&lift&&lift.trackType==='weighted_pullup';

  const wtEl=document.getElementById('wmWt');
  const rpEl=document.getElementById('wmRp');

  if(sugg){
    const tc=sugg.phase==='progress'?'tup':sugg.phase==='deload'||sugg.phase==='reduced'?'tdown':sugg.phase==='baseline'?'tbase':'thold';
    wtEl.innerHTML=`<div class="wmsg">Suggested: <strong>${sugg.weight}lb</strong> · <span class="wtt ${tc}" style="font-size:9px">${sugg.label}</span></div><div class="wmir"><input type="number" class="wmin" id="wmWtIn" value="${sugg.weight}" step="2.5" inputmode="decimal"/><span class="wmu">lb</span></div>`;
    wtEl.style.display='block';rpEl.style.display='none';
    document.getElementById('wmRL').textContent='Hit your reps?';
    document.getElementById('wmBtns').innerHTML=`<button class="wmb wmby" onclick="wmLogWt(true)"><i class="ti ti-check"></i> Yes</button><button class="wmb wmbn" onclick="wmLogWt(false)"><i class="ti ti-x"></i> No</button>`;
  } else if(isReps){
    const best=S.weights[e.n]?.bestReps||0;
    rpEl.innerHTML=`<div class="wmrpl">Reps today${best?' (best: '+best+')':''}</div><div class="wmir"><input type="number" class="wmin" id="wmRpIn" placeholder="reps" min="0" max="50" inputmode="numeric"/><span class="wmu">reps</span></div>`;
    rpEl.style.display='block';wtEl.style.display='none';
    document.getElementById('wmRL').textContent='';
    document.getElementById('wmBtns').innerHTML=`<button class="wmb wmby" style="width:100%;max-width:280px" onclick="wmLogReps()"><i class="ti ti-check"></i> Log reps</button>`;
  } else if(isPullup){
    const w=S.weights[e.n];
    rpEl.innerHTML=`<div class="wmrpl">Weight added + reps (0 = bodyweight)</div><div class="wmir"><input type="number" class="wmin" id="wmWtIn" value="${w?.addedWeight||0}" step="2.5" inputmode="decimal" style="width:64px"/><span class="wmu">lb</span><input type="number" class="wmin" id="wmRpIn" placeholder="reps" style="width:64px;margin-left:8px" inputmode="numeric"/><span class="wmu">reps</span></div>`;
    rpEl.style.display='block';wtEl.style.display='none';
    document.getElementById('wmRL').textContent='Hit your reps?';
    document.getElementById('wmBtns').innerHTML=`<button class="wmb wmby" onclick="wmLogPU(true)"><i class="ti ti-check"></i> Yes</button><button class="wmb wmbn" onclick="wmLogPU(false)"><i class="ti ti-x"></i> No</button>`;
  } else {
    wtEl.style.display='none';rpEl.style.display='none';
    document.getElementById('wmRL').textContent='';
    document.getElementById('wmBtns').innerHTML=`<button class="wmb wmby" style="width:100%;max-width:280px" onclick="wmNext()"><i class="ti ti-check"></i> Done</button>`;
  }

  const restSec=REST[e.n]||REST.default;
  timerTotal=restSec;timerRemaining=restSec;timerRunning=false;clearInterval(timerInterval);
  document.getElementById('wmTBtn').textContent='Start rest';
  document.getElementById('wmTBtn').className='wmtb wmts';
  updateTimerUI();
}

function toggleWMDemo(){
  const area=document.getElementById('wmDemo');
  const btn=document.getElementById('wmDemoBtn');

function wmLogReps(){

function wmLogPU(hit){
  const wi=document.getElementById('wmWtIn');const ri=document.getElementById('wmRpIn');
  const added=parseFloat(wi?.value||0);const reps=parseInt(ri?.value||0);
  const name=wmList[wmIdx].n;
  if(!S.weights[name])S.weights[name]={current:added,sessions:0,missStreak:0,hitLast:true,history:[],type:'weighted_pullup',bestReps:0,addedWeight:added};
  const w=S.weights[name];w.addedWeight=added;w.current=added;w.sessions++;w.hitLast=hit;

function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('wmTBtn').textContent='Resume';document.getElementById('wmTBtn').className='wmtb wmtr';}
  else{
    if(timerRemaining<=0)timerRemaining=timerTotal;
    timerRunning=true;document.getElementById('wmTBtn').textContent='Pause';document.getElementById('wmTBtn').className='wmtb wmtr';
    timerInterval=setInterval(()=>{
      timerRemaining--;updateTimerUI();
      if(timerRemaining<=0){clearInterval(timerInterval);timerRunning=false;if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);document.getElementById('wmTBtn').textContent='Go!';document.getElementById('wmTBtn').className='wmtb wmts';}
    },1000);
  }
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerRemaining=timerTotal;document.getElementById('wmTBtn').textContent='Start rest';document.getElementById('wmTBtn').className='wmtb wmts';updateTimerUI();}
function updateTimerUI(){
  const m=Math.floor(timerRemaining/60);const s=timerRemaining%60;
  document.getElementById('wmTv').textContent=timerRemaining>0?`${m}:${s.toString().padStart(2,'0')}`:'Go!';
  const pct=timerTotal>0?Math.round(timerRemaining/timerTotal*100):0;
  const bar=document.getElementById('wmTBar');bar.style.width=pct+'%';
  bar.style.background=timerRemaining<10?'var(--red)':timerRemaining<30?'var(--amber)':'var(--green)';
}
function wmNext(){clearInterval(timerInterval);timerRunning=false;wmIdx++;renderWMEx();}

    <div class="pgst"><div class="pgsl">Sessions</div><div class="pgsv">${total}</div><div class="pgbg"><div class="pgb" style="width:${Math.min(total/20*100,100)}%;background:var(--green)"></div></div></div>
    <div class="pgst"><div class="pgsl">Streak</div><div class="pgsv">${S.streak}d</div><div class="pgbg"><div class="pgb" style="width:${Math.min(S.streak/30*100,100)}%;background:var(--blue)"></div></div></div>
    <div class="pgst"><div class="pgsl">Weeks done</div><div class="pgsv">${S.totalWeeks}</div><div class="pgbg"><div class="pgb" style="width:${Math.min(S.totalWeeks/12*100,100)}%;background:var(--purple)"></div></div></div>
    <div class="pgst"><div class="pgsl">Consistency</div><div class="pgsv">${cons}%</div><div class="pgbg"><div class="pgb" style="width:${cons}%;background:var(--amber)"></div></div></div>
  </div>
  <div class="slbl">How are you feeling?</div>
  <textarea class="ni2" id="progNotes" rows="3" placeholder="Energy, shoulder, recent lifts, anything notable…"></textarea>
  <div class="slbl">Progress photo (optional)</div>
  <div class="pu" onclick="document.getElementById('progPhotoInput').click()">
    <i class="ti ti-camera" style="font-size:24px;color:var(--text3)"></i>
    <div style="font-size:13px;color:var(--text2);margin-top:6px" id="progPhotoLabel">Tap to attach a photo</div>
    <div style="font-size:11px;color:var(--text3);margin-top:2px">Or <span style="color:var(--purple);font-weight:500;cursor:pointer" onclick="event.stopPropagation();nav('photos')">view photo journal →</span></div>
  </div>
  <button class="chkb" id="checkBtn" onclick="runCheck()"><i class="ti ti-telescope" style="font-size:14px"></i>Run progress check</button>
  <div id="progResult"></div><div style="height:16px"></div>`;
  document.getElementById('progressScreen').innerHTML=h;
}

function handleProgPhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.uploadedPhoto=ev.target.result;save();const l=document.getElementById('progPhotoLabel');if(l)l.textContent='Photo ready — '+f.name;};r.readAsDataURL(f);}

async function runCheck(){
  const btn=document.getElementById('checkBtn');btn.disabled=true;btn.innerHTML=`<span class="sp"></span>Analysing…`;
  const notes=document.getElementById('progNotes')?.value?.trim()||'';
  const liftSummary=Object.entries(S.weights).map(([n,w])=>{
    if(w.type==='reps')return`${n}: best ${w.bestReps} reps (${w.sessions} sessions)`;
    if(w.type==='weighted_pullup')return`${n}: +${w.addedWeight||0}lb, best ${w.bestReps} reps (${w.sessions} sessions)`;
    return`${n}: ${w.current}lb (${w.sessions} sessions, ${w.hitLast?'hitting reps':'missing reps'})`;
  }).join('; ');
  const ctx=`Athlete: 41yo male, lean athletic build, strong cardio (surfing, cycling, hiking, skiing, wingfoiling). Goal: LeoMoves physique — lean, functional, athletic. NOT bulky. Injuries: supraspinatus (right shoulder — no overhead pressing), Achilles history (no plyometrics). Program: at-home upper/lower split 3x/week + LeoMoves + unscheduled sport. Week ${S.totalWeeks}. Streak: ${S.streak}d. Sessions: ${total}. Lifts: ${liftSummary||'none yet'}. Notes: ${notes||'none'}. Phase 2 program update needed at week 8–10.`;
  const msgs=[{role:'user',content:S.uploadedPhoto?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:S.uploadedPhoto.split(',')[1]}},{type:'text',text:ctx+'\n\nHonest progress check: (1) what\'s on track, (2) what needs attention, (3) one specific tweak, (4) 4-week target. Direct, personal, max 180 words, no bullets.'}]:[{type:'text',text:ctx+'\n\nHonest progress check: (1) what\'s on track, (2) what needs attention, (3) one specific tweak, (4) 4-week target. Direct, personal, max 180 words, no bullets.'}]}];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:msgs})});
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    document.getElementById('progResult').innerHTML=`<div class="air">${text.split('\n').filter(p=>p.trim()).map(p=>`<p>${p}</p>`).join('')}</div>`;
  }catch(e){document.getElementById('progResult').innerHTML=`<div class="air"><p>Couldn't connect. Try again.</p></div>`;}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh" style="font-size:14px"></i>Run again';
}

// ── PHOTOS SCREEN ─────────────────────────────────────────
let phTimerInterval=null,phTimerVal=0,phTimerRunning=false;

function compress(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.75));
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}
function handleNewPhoto(e){
  const file=e.target.files[0];if(!file)return;
  compress(file,dataUrl=>{
    if(!S.photos)S.photos=[];
    const note=prompt('Label this photo (e.g. "Week 1 front"):','')||'';
    S.photos.unshift({id:Date.now(),date:new Date().toISOString(),dataUrl,note});
    try{save();}catch(err){alert('Storage full — delete older photos.');S.photos.shift();return;}
    S.photoLastTaken=new Date().toISOString();save();renderPhotos();renderHome();
  });e.target.value='';
}
function deletePhoto(id){if(!confirm('Delete this photo?'))return;S.photos=(S.photos||[]).filter(p=>p.id!==id);save();renderPhotos();}
function openLB(id){const p=(S.photos||[]).find(p=>p.id===id);if(!p)return;document.getElementById('lbImg').src=p.dataUrl;document.getElementById('lbDate').textContent=new Date(p.date).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});document.getElementById('lbNote').textContent=p.note||'';document.getElementById('lightbox').classList.add('open');}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}

function startPhotoTimer(){
  phTimerVal=5;phTimerRunning=true;
  document.getElementById('phTimerVal').textContent=phTimerVal;
  document.getElementById('phTimerBtn').textContent='Cancel';
  phTimerInterval=setInterval(()=>{
    phTimerVal--;
    document.getElementById('phTimerVal').textContent=phTimerVal;
    if(navigator.vibrate)navigator.vibrate(100);
    if(phTimerVal<=0){
      clearInterval(phTimerInterval);phTimerRunning=false;
      document.getElementById('phTimerBtn').textContent='Start timer';
      document.getElementById('phTimerVal').textContent='📸';
      if(navigator.vibrate)navigator.vibrate([300,100,300]);
      setTimeout(()=>document.getElementById('photoCapture').click(),300);
    }
  },1000);
}
function togglePhTimer(){
  if(phTimerRunning){clearInterval(phTimerInterval);phTimerRunning=false;renderPhotos();}
  else startPhotoTimer();
}

function renderPhotos(){
  const photos=S.photos||[];
  const usedKB=Math.round(JSON.stringify(S).length*2/1024);
  const maxKB=4500;const pct=Math.min(Math.round(usedKB/maxKB*100),100);
  let h=`<div class="ph"><div class="pt">Photos</div><div class="ps">Visual record of your journey</div></div>`;

  // Photo timer
  h+=`<div class="phtimer">
    <div class="phtimer-val" id="phTimerVal">5</div>
    <div class="phtimer-lbl">Step back, then tap Start timer</div>
    <button class="phtimer-btn" id="phTimerBtn" onclick="togglePhTimer()"><i class="ti ti-clock" style="font-size:13px"></i> Start timer</button>
  </div>`;

  h+=`<button class="pha" onclick="document.getElementById('photoCapture').click()"><i class="ti ti-camera" style="font-size:18px"></i>Take photo now</button>`;
  h+=`<div class="phst"><div class="phstb"><div class="phstf" style="width:${pct}%"></div></div><div class="phstl">Storage: ~${usedKB}KB / ${maxKB}KB${pct>80?' · Getting full':''}</div></div>`;

  if(photos.length===0){
    h+=`<div class="phem"><i class="ti ti-camera"></i><div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px">No photos yet</div><div style="font-size:12px;color:var(--text3);line-height:1.5">Use the timer above to step back and take a front and side shot each week.</div></div>`;
  } else {
    h+=`<div class="phg">`;
    photos.forEach(p=>{
      const d=new Date(p.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      h+=`<div class="phe"><img src="${p.dataUrl}" alt="progress" onclick="openLB(${p.id})"/><div class="phm">${p.note||'Progress photo'}<div class="phd">${d}</div></div><button class="phd2" onclick="deletePhoto(${p.id})"><i class="ti ti-trash" style="font-size:11px"></i></button></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div style="height:16px"></div>`;
  document.getElementById('photosScreen').innerHTML=h;
}

// ── PLAN PROMPT ───────────────────────────────────────────
function showPlanPrompt(){
  const next=PROG[(DOW+1)%7];
  document.getElementById('planSub').textContent=`When are you training ${next.isRest?'next':'tomorrow'}?`;
  const times=['6am','7am','8am','9am','10am','12pm','5pm','6pm','7pm','8pm'];
  document.getElementById('timeChips').innerHTML=times.map(t=>`<span class="tc${S.selectedPlanTime===t?' sel':''}" onclick="selPlan('${t}')">${t}</span>`).join('');
  document.getElementById('planOverlay').classList.add('open');
}
function selPlan(t){S.selectedPlanTime=t;save();document.querySelectorAll('.tc').forEach(c=>c.classList.toggle('sel',c.textContent===t));}
function confirmPlan(){document.getElementById('planOverlay').classList.remove('open');}

// ── SHARE ─────────────────────────────────────────────────
function showShare(){
  const total=Object.keys(S.completedDays).length;
  let bestLift='—';let bestVal=0;
  Object.entries(S.weights).forEach(([n,w])=>{if((w.current||0)>bestVal){bestVal=w.current;bestLift=n.split(' ').pop()+' '+w.current+'lb';}});
  const week=today.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('shareCard').innerHTML=`
    <div class="shh"><div class="shtit">Weekly summary</div><div class="shdt">w/e ${week}</div></div>
    <div class="shsk"><div class="shsv">${S.streak}</div><div class="shsl">day streak</div></div>
    <div class="shss">
      <div class="ssi"><div class="ssv">${total}</div><div class="ssl">Sessions</div></div>
      <div class="ssi"><div class="ssv">${S.shields}🛡️</div><div class="ssl">Shields</div></div>
      <div class="ssi"><div class="ssv">${S.totalWeeks}</div><div class="ssl">Weeks</div></div>
    </div>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px">Top: ${bestLift}</div>
    <div class="shbs"><button class="shbt shcp" onclick="copyShare()">Copy</button><button class="shbt shcl" onclick="closeShare()">Close</button></div>`;
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShare(){document.getElementById('shareOverlay').classList.remove('open');}
function copyShare(){
  const text=`${S.streak} day training streak 🔥\n${Object.keys(S.completedDays).length} sessions · ${S.totalWeeks} weeks\nBuilding the LeoMoves physique — lean, athletic, functional.`;
  navigator.clipboard?.writeText(text).catch(()=>{});
  const btn=document.querySelector('.shcp');if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);}
}

// ── INIT ──────────────────────────────────────────────────
if(!S.photos)S.photos=[];
if(!S.leoWeek)S.leoWeek=0;
setupShake();
renderHome();
</script>
